function rStats() {
  const G = DB.grafts;
  if (!G.length) return `<div class="card"><div class="empty"><div class="ei">-</div><p>No data yet.</p></div></div>`;

  const tGr = G.reduce((a,g) => a+totalGrafted(g), 0);
  const tEm = G.reduce((a,g) => a+totalEmerged(g), 0);
  const tMt = G.reduce((a,g) => a+totalMated(g), 0);
  const breedPct  = pct(tEm, tGr);
  const matedPct  = pct(tMt, tGr);

  // By week
  const byWeek = {};
  G.forEach(g => {
    const wk = dayjs(g.date).startOf('week').format('YYYY-MM-DD');
    if (!byWeek[wk]) byWeek[wk] = { grafted:0, emerged:0, mated:0, count:0 };
    byWeek[wk].grafted += totalGrafted(g);
    byWeek[wk].emerged += totalEmerged(g);
    byWeek[wk].mated   += totalMated(g);
    byWeek[wk].count++;
  });

  const weekRows = Object.entries(byWeek).sort((a,b)=>b[0].localeCompare(a[0])).map(([wk,d]) => {
    const p = pct(d.emerged, d.grafted);
    return `<tr>
      <td style="padding:8px;font-size:12px;font-weight:600">Wk ${fmt(wk)}</td>
      <td style="padding:8px;text-align:center;font-weight:700">${d.count}</td>
      <td style="padding:8px;text-align:center">${d.grafted}</td>
      <td style="padding:8px;text-align:center">${d.emerged}</td>
      <td style="padding:8px;text-align:center">${d.mated}</td>
      <td style="padding:8px;text-align:center">
        ${p!==null?`<span class="chip ${p>=70?'chip-ok':p>=40?'chip-warn':'chip-due'}">${p}%</span>`:'—'}
      </td>
    </tr>`;
  }).join('');

  // Per starter (across all grafts)
  const starterStats = {};
  G.forEach(g => {
    (g.starter_allocations||[]).forEach(sa => {
      if (!starterStats[sa.starter_id]) starterStats[sa.starter_id] = { in:0, out:0 };
      starterStats[sa.starter_id].in  += sa.cells_in||0;
      starterStats[sa.starter_id].out += starterCellsOut(g, sa.starter_id);
    });
  });

  const starterRows = Object.entries(starterStats).map(([sid,d]) => {
    const S = hById(sid); const p = pct(d.out, d.in);
    return `<tr>
      <td style="padding:8px;font-size:12px;font-weight:600">${S?S.name:sid}</td>
      <td style="padding:8px;text-align:center">${d.in}</td>
      <td style="padding:8px;text-align:center">${d.out}</td>
      <td style="padding:8px;text-align:center">
        ${p!==null?`<span class="chip ${p>=70?'chip-ok':p>=40?'chip-warn':'chip-due'}">${p}%</span>`:'—'}
      </td>
    </tr>`;
  }).join('');

  // Per finisher
  const finStats = {};
  G.forEach(g => {
    (g.finisher_records||[]).forEach(fr => {
      if (!finStats[fr.finisher_id]) finStats[fr.finisher_id] = { received:0, emerged:0, mated:0 };
      finStats[fr.finisher_id].received += fr.cells_received||0;
      finStats[fr.finisher_id].emerged  += fr.emerged||0;
      finStats[fr.finisher_id].mated    += fr.mated||0;
    });
  });

  const finRows = Object.entries(finStats).map(([fid,d]) => {
    const F = hById(fid); const p = pct(d.emerged, d.received);
    return `<tr>
      <td style="padding:8px;font-size:12px;font-weight:600">${F?F.name:fid}</td>
      <td style="padding:8px;text-align:center">${d.received}</td>
      <td style="padding:8px;text-align:center">${d.emerged}</td>
      <td style="padding:8px;text-align:center">${d.mated}</td>
      <td style="padding:8px;text-align:center">
        ${p!==null?`<span class="chip ${p>=70?'chip-ok':p>=40?'chip-warn':'chip-due'}">${p}%</span>`:'—'}
      </td>
    </tr>`;
  }).join('');

  // Per breeder
  const breederStats = {};
  G.forEach(g => {
    if (!breederStats[g.breeder_id]) breederStats[g.breeder_id] = { grafted:0, emerged:0 };
    breederStats[g.breeder_id].grafted += totalGrafted(g);
    breederStats[g.breeder_id].emerged += totalEmerged(g);
  });

  const tblStyle = 'width:100%;border-collapse:collapse;font-size:12px';
  const thStyle  = 'background:var(--wax);padding:8px;text-align:left';

  return `
    <!-- HEADLINE BREEDING % -->
    <div class="card" style="border:2px solid var(--amber)">
      <div class="sec-lbl" style="margin-bottom:6px">Overall Breeding Percentage</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span style="font-size:48px;font-weight:800;color:var(--amber);line-height:1">${breedPct!==null?breedPct+'%':'—'}</span>
        <span class="t-sm">${tEm} out of ${tGr} grafted</span>
      </div>
      ${pctBar(breedPct)}
      ${matedPct!==null?`<div class="mt8 sec-lbl">Mated & laying</div>
        <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:4px">
          <span style="font-size:28px;font-weight:800;color:var(--green);line-height:1">${matedPct}%</span>
          <span class="t-sm">${tMt} mated of ${tGr} grafted</span>
        </div>
        ${pctBar(matedPct)}`:''}
    </div>

    <!-- SEASON TOTALS -->
    <div class="stats-row">
      <div class="stat"><div class="n">${G.length}</div><div class="l">Grafts</div></div>
      <div class="stat"><div class="n">${tGr}</div><div class="l">Grafted</div></div>
      <div class="stat"><div class="n">${tEm}</div><div class="l">Emerged</div></div>
      <div class="stat"><div class="n">${tMt}</div><div class="l">Mated</div></div>
    </div>

    <!-- BY BREEDER -->
    <div class="card">
      <div class="card-hd">By Breeder</div>
      ${Object.entries(breederStats).map(([bid,d]) => {
        const B = hById(bid); const p = pct(d.emerged, d.grafted);
        return `<div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px">
            <span class="chip chip-B">${B?B.name:bid}</span>
            <span class="t-xs">${d.grafted} grafted · ${d.emerged} emerged</span>
          </div>${pctBar(p)}
        </div>`;
      }).join('')||`<p class="t-sm">No data yet.</p>`}
    </div>

    <!-- BY STARTER -->
    <div class="card">
      <div class="card-hd">By Starter</div>
      <div style="overflow-x:auto">
        <table style="${tblStyle}">
          <thead><tr style="background:var(--wax)">
            <th style="${thStyle}">Starter</th>
            <th style="padding:8px;text-align:center">Received</th>
            <th style="padding:8px;text-align:center">Sent out</th>
            <th style="padding:8px;text-align:center">Rate</th>
          </tr></thead>
          <tbody>${starterRows||'<tr><td colspan="4" style="padding:12px;text-align:center;color:var(--brown3)">No data yet</td></tr>'}</tbody>
        </table>
      </div>
    </div>

    <!-- BY FINISHER -->
    <div class="card">
      <div class="card-hd">By Finisher</div>
      <div style="overflow-x:auto">
        <table style="${tblStyle}">
          <thead><tr style="background:var(--wax)">
            <th style="${thStyle}">Finisher</th>
            <th style="padding:8px;text-align:center">In</th>
            <th style="padding:8px;text-align:center">Emerged</th>
            <th style="padding:8px;text-align:center">Mated</th>
            <th style="padding:8px;text-align:center">Rate</th>
          </tr></thead>
          <tbody>${finRows||'<tr><td colspan="5" style="padding:12px;text-align:center;color:var(--brown3)">No data yet</td></tr>'}</tbody>
        </table>
      </div>
    </div>

    <!-- BY WEEK -->
    <div class="card">
      <div class="card-hd">By Week</div>
      <div style="overflow-x:auto">
        <table style="${tblStyle}">
          <thead><tr style="background:var(--wax)">
            <th style="${thStyle}">Week</th>
            <th style="padding:8px;text-align:center">Grafts</th>
            <th style="padding:8px;text-align:center">Grafted</th>
            <th style="padding:8px;text-align:center">Emerged</th>
            <th style="padding:8px;text-align:center">Mated</th>
            <th style="padding:8px;text-align:center">Rate</th>
          </tr></thead>
          <tbody>${weekRows}</tbody>
        </table>
      </div>
    </div>

    <!-- EVERY GRAFT -->
    <div class="card">
      <div class="card-hd">Every Graft</div>
      ${G.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(g => {
        const B=hById(g.breeder_id), em=totalEmerged(g), p=pct(em,totalGrafted(g));
        const starters=(g.starter_allocations||[]).map(sa=>hById(sa.starter_id)?.name||'?').join(', ');
        return `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--wax2);flex-wrap:wrap">
          <span style="font-size:13px;font-weight:700;min-width:90px">${fmtF(g.date)}</span>
          <span class="chip chip-B" style="font-size:10px">${B?B.name:'?'}</span>
          <span class="chip ${g.protocol==='autumn'?'chip-A':'chip-std'}" style="font-size:10px">${g.protocol}</span>
          <span class="t-xs">${totalGrafted(g)} grafted → ${em} emerged</span>
          ${p!==null?`<span class="chip ${p>=70?'chip-ok':p>=40?'chip-warn':'chip-due'}" style="margin-left:auto">${p}%</span>`
                    :`<span style="margin-left:auto" class="t-xs">—</span>`}
        </div>`;
      }).join('')}
    </div>`;
}
function rCalendar() {
  const G = DB.grafts;
  if (!G.length) return `<div class="card"><div class="empty"><div class="ei">-</div><p>No grafts yet.</p></div></div>`;

  // Build 60-day window anchored to earliest graft
  const allDates = G.map(g => g.date);
  const minD = dayjs(allDates.reduce((a,b) => a<b?a:b));
  const CAL_DAYS = 60;
  const cols = Array.from({length: CAL_DAYS}, (_,i) => minD.add(i,'day'));
  const todayStr = today();

  // Col index helpers
  const colX = (dateStr) => {
    const idx = cols.findIndex(c => c.format('YYYY-MM-DD') === dateStr);
    return idx >= 0 ? idx : null;
  };
  const COL_W = 9;   // px per day column
  const ROW_H = 22;  // px per finisher row
  const LABEL_W = 78;
  const TOTAL_W = LABEL_W + CAL_DAYS * COL_W;

  // Build rows: one per finisher per graft
  const rows = [];
  // Sort: active batches (out date today or future) first, newest first within each group
  // Completed (out date passed) sink to bottom, sorted oldest first so most recent completed is nearest top
  function graftOutDate(g) {
    const d = dayjs(g.date);
    return g.protocol === 'autumn'
      ? d.add(2,'day').format('YYYY-MM-DD')
      : d.add(10,'day').format('YYYY-MM-DD');
  }
  function isCompleted(g) { return graftOutDate(g) < today(); }

  const sortedG = G.slice().sort((a,b) => {
    const aCom = isCompleted(a), bCom = isCompleted(b);
    if (aCom !== bCom) return aCom ? 1 : -1;  // active first
    if (!aCom) return b.date.localeCompare(a.date);  // active: newest first
    return a.date.localeCompare(b.date);  // completed: oldest first (most recent completed near top)
  });

  let _shownCompletedHeader = false;
  sortedG.forEach(g => {
    if (isCompleted(g) && !_shownCompletedHeader) {
      _shownCompletedHeader = true;
      tableRows += `<tr><td colspan="${2 + CAL_DAYS}" style="padding:4px 8px;background:var(--brown2);color:var(--brown3);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Completed</td></tr>`;
    }
    const B = hById(g.breeder_id), S = hById(g.starter_id);
    const frecs = g.finisher_records || [];
    const d = dayjs(g.date);
    const dates = {
      graft:   g.date,
      starter: d.add(1,'day').format('YYYY-MM-DD'),
      capped:  d.add(5,'day').format('YYYY-MM-DD'),
      out:     d.add(10,'day').format('YYYY-MM-DD'),
      mated:   d.add(30,'day').format('YYYY-MM-DD'),
    };
    if (g.protocol === 'autumn') {
      dates.out = d.add(2,'day').format('YYYY-MM-DD');
      delete dates.starter; delete dates.capped; delete dates.mated;
    }
    const groupLabel = `${fmtF(g.date)} · ${B?B.name:'?'}→${S?S.name:'?'}`;

    if (!frecs.length) {
      rows.push({ graft:g, finisher:null, dates, groupLabel, isFirst:true, grafted:g.grafted||0, cells_received:0, emerged:null });
    } else {
      frecs.forEach((fr,i) => {
        const F = hById(fr.finisher_id);
        rows.push({ graft:g, finisher:F, fr, dates, groupLabel, isFirst:i===0,
          grafted:g.grafted||0, cells_received:fr.cells_received||0, emerged:fr.emerged, mated:fr.mated });
      });
    }
  });

  // Today column index
  const todayIdx = cols.findIndex(c => c.format('YYYY-MM-DD') === todayStr);

  // Build month header spans
  const monthSpans = [];
  let lastMo = '', moStart = 0;
  cols.forEach((c,i) => {
    const mo = c.format('MMM YY');
    if (mo !== lastMo) {
      if (lastMo) monthSpans.push({label: lastMo, start: moStart, end: i-1});
      lastMo = mo; moStart = i;
    }
  });
  monthSpans.push({label: lastMo, start: moStart, end: cols.length-1});

  // Build date header: show every 5th day
  const dateHdrCells = cols.map((c,i) => {
    const isT = c.format('YYYY-MM-DD') === todayStr;
    const show = i % 5 === 0;
    return `<td style="width:${COL_W}px;min-width:${COL_W}px;padding:0;text-align:center;font-size:8px;color:${isT?'var(--amber)':'var(--brown3)'};background:${isT?'var(--wax)':'transparent'};font-weight:${isT?'700':'400'}">${show?c.format('D'):''}</td>`;
  }).join('');

  const monthHdrCells = monthSpans.map(m =>
    `<td colspan="${m.end-m.start+1}" style="padding:2px 4px;font-size:9px;font-weight:700;color:var(--white);background:var(--brown);text-align:left">${m.label}</td>`
  ).join('');

  // Build data rows
  let tableRows = '';
  let lastGraftId = null;
  rows.forEach(row => {
    const g = row.graft;
    const isNewGraft = g.id !== lastGraftId;
    lastGraftId = g.id;
    const topBorder = isNewGraft ? 'border-top:2px solid var(--amber)' : '';

    // label cells
    const labelCell = `<td style="padding:2px 8px;font-size:10px;font-weight:700;background:var(--wax);white-space:nowrap;position:sticky;left:0;z-index:2;${topBorder}">${row.isFirst ? row.groupLabel : ''}</td>
      <td style="padding:2px 6px;font-size:9px;color:var(--cF);background:var(--wax);white-space:nowrap;position:sticky;left:0;z-index:2;${topBorder}">${row.finisher?row.finisher.name:row.isFirst?'—':''}</td>`;

    // Bar cells
    const { dates } = row;
    const dateCells = cols.map((c,i) => {
      const ds = c.format('YYYY-MM-DD');
      const isT = ds === todayStr;
      let inner = '', bg = isT ? 'var(--wax)' : 'transparent';

      if (g.protocol === 'standard') {
        if (ds === dates.graft)   { inner = `<span style="background:var(--amber);color:var(--white);border-radius:3px;padding:1px 3px;font-size:8px;font-weight:700">G</span>`; }
        else if (ds === dates.starter) { inner = `<span style="background:#93c5fd;color:#1e3a8a;border-radius:3px;padding:1px 3px;font-size:8px;font-weight:700">S</span>`; }
        else if (ds > dates.starter && ds < dates.capped) { bg = '#eff6ff'; }
        else if (ds === dates.capped)  {
          const hasCapped = row.fr && row.fr.capped != null;
          inner = `<span style="background:${hasCapped?'var(--honey)':'transparent'};color:var(--brown);border:1px solid var(--honey);border-radius:3px;padding:1px 3px;font-size:8px;font-weight:700">${hasCapped?row.fr.capped:'?'}</span>`;
        }
        else if (ds > dates.capped && ds < dates.out) { bg = '#fef9c3'; }
        else if (ds === dates.out) {
          const hasOut = row.fr && row.fr.emerged != null;
          const p = row.cells_received ? pct(row.fr?.emerged||0, row.cells_received) : null;
          const col = p===null?'var(--brown3)':p>=70?'var(--green)':p>=40?'var(--amber)':'var(--red)';
          if (isPast(ds) || isToday(ds)) {
            inner = `<span style="background:${hasOut?'#bbf7d0':'transparent'};color:${col};border:1px solid #86efac;border-radius:3px;padding:1px 3px;font-size:8px;font-weight:700">${hasOut?row.fr.emerged:'?'}</span>`;
          } else {
            inner = `<span style="border:1px dashed var(--brown3);border-radius:3px;padding:1px 3px;font-size:8px;color:var(--brown3)">—</span>`;
          }
        }
        else if (ds === dates.mated && row.fr?.mated != null) {
          inner = `<span style="background:#e9d5ff;color:#6b21a8;border-radius:3px;padding:1px 3px;font-size:8px;font-weight:700">M</span>`;
        }
      } else {
        // autumn
        if (ds === dates.graft) { inner = `<span style="background:var(--cA);color:var(--white);border-radius:3px;padding:1px 3px;font-size:8px;font-weight:700">G</span>`; }
        else if (ds === dates.out) {
          const hasOut = row.fr && row.fr.emerged != null;
          inner = hasOut
            ? `<span style="background:#bbf7d0;color:var(--green);border-radius:3px;padding:1px 3px;font-size:8px;font-weight:700">${row.fr.emerged}</span>`
            : `<span style="border:1px dashed var(--brown3);border-radius:3px;padding:1px 3px;font-size:8px;color:var(--brown3)">—</span>`;
        }
      }
      return `<td style="width:${COL_W}px;min-width:${COL_W}px;padding:1px 0;text-align:center;background:${bg};border:0.5px solid var(--wax2);${topBorder}">${inner}</td>`;
    }).join('');

    const rowOpacity = isCompleted(g) ? 'opacity:0.4' : '';
    tableRows += `<tr onclick="openRecordPanel('${g.id}')" style="cursor:pointer;${rowOpacity}">${labelCell}${dateCells}</tr>`;
  });

  // Today line (we use sticky column highlight instead)
  return `
    <div class="card" style="padding:12px 8px">
      <div class="card-hd" style="margin-bottom:8px">Season Calendar
        <span class="t-xs" style="margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span style="background:var(--amber);color:var(--white);border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700">G</span>Graft
          <span style="background:#93c5fd;color:#1e3a8a;border-radius:3px;padding:1px 5px;font-size:9px">S</span>Starter
          <span style="background:var(--honey);color:var(--brown);border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700">n</span>Capped
          <span style="background:#bbf7d0;color:var(--green);border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700">n</span>Out
          <span style="border:1px dashed var(--brown3);border-radius:3px;padding:1px 5px;font-size:9px;color:var(--brown3)">—</span>Due
        </span>
      </div>
      <p class="t-xs" style="margin-bottom:8px">Tap any row to record counts. Today is highlighted.</p>
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table style="border-collapse:collapse;font-size:10px;width:${TOTAL_W}px">
          <thead>
            <tr><td colspan="2" style="background:var(--brown);padding:2px 8px"></td>${monthHdrCells}</tr>
            <tr>
              <td style="padding:2px 8px;background:var(--wax);position:sticky;left:0;z-index:3;font-size:9px;font-weight:700;color:var(--brown2)">Graft</td>
              <td style="padding:2px 8px;background:var(--wax);font-size:9px;font-weight:700;color:var(--cF)">Hive</td>
              ${dateHdrCells}
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;
}

function saveSupa() {
  DB.supaUrl = document.getElementById('sbu').value.trim();
  DB.supaKey = document.getElementById('sbk').value.trim();
  localStorage.setItem('qct_cfg', JSON.stringify({url:DB.supaUrl,key:DB.supaKey}));
  SUPA = null; // force reinit with new credentials
  toast('Connecting...');
  syncFromSupa().then(ok => {
    if (ok) { toast('Connected and synced'); render(); }
    // error toast already shown inside syncFromSupa
  });
}
function clrSupa() { DB.supaUrl=''; DB.supaKey=''; SUPA=null; localStorage.removeItem('qct_cfg'); toast('Disconnected'); render(); }
function expData() {
  const b = new Blob([JSON.stringify({hives:DB.hives,grafts:DB.grafts},null,2)],{type:'application/json'});

function impData(i) {

  r.onload = e => { try { const d=JSON.parse(e.target.result); DB.hives=d.hives||[]; DB.grafts=d.grafts||[]; save(); toast('Imported'); render(); } catch { toast('Invalid file'); }};
  r.readAsText(i.files[0]);
}
function clrAll() { if (!confirm('Delete ALL data?')) return; DB.hives=[]; DB.grafts=[]; save(); toast('Cleared'); render(); }

// TOAST
// ═══════════════════════════════════════════════════════
function toast(m) {
  const e = document.getElementById('toast');
  e.textContent = m; e.classList.add('show');
  setTimeout(() => e.classList.remove('show'), 2600);
}

// ═══════════════════════════════════════════════════════
// SUPABASE SYNC — uses fetch() directly, no library needed
// Works in browser AND iOS home screen standalone mode
// ═══════════════════════════════════════════════════════
let SUPA = null;

function supaHeaders() {
  return {
    'apikey': DB.supaKey,
    'Authorization': 'Bearer ' + DB.supaKey,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };
}

function supaUrl(table, params) {
  let url = DB.supaUrl.replace(/\/$/, '') + '/rest/v1/' + table;
  if (params) url += '?' + params;
  return url;
}

async function supaGet(table, params) {
  const res = await fetch(supaUrl(table, params), {
    method: 'GET',
    headers: { ...supaHeaders(), 'Accept': 'application/json' }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(res.status + ': ' + err);
  }
  return res.json();
}

async function supaUpsert(table, rows) {
  if (!rows.length) return;
  const res = await fetch(supaUrl(table), {
    method: 'POST',
    headers: { ...supaHeaders(), 'Prefer': 'resolution=merge-duplicates,return=minimal' },
    body: JSON.stringify(rows)
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(res.status + ': ' + err);
  }
}

async function supaDelete(table, id) {
  const res = await fetch(supaUrl(table, 'id=eq.' + encodeURIComponent(id)), {
    method: 'DELETE',
    headers: supaHeaders()
  });
  if (!res.ok) {
    const err = await res.text();
    console.error('Delete failed:', err);
  }
}

function initSupa() {
  return !!(DB.supaUrl && DB.supaKey);
}

async function syncFromSupa() {
  if (!initSupa()) return false;
  try {
    const [hives, grafts] = await Promise.all([
      supaGet('qct_hives', 'select=*'),
      supaGet('qct_grafts', 'select=*')
    ]);
    DB.hives  = hives.map(h => ({...h, log: h.log||[]}));
    DB.grafts = grafts.map(g => ({
      ...g, movements: g.movements||[], finisher_records: g.finisher_records||[]
    }));
    saveLocal();
    const dot = document.getElementById('db-dot');
    if (dot) dot.className = 'db-dot ok';
    return true;
  } catch(e) {
    console.error('Sync failed:', e);
    toast('Sync error: ' + e.message);
    const dot = document.getElementById('db-dot');
    if (dot) dot.className = 'db-dot err';
    return false;
  }
}

async function pushToSupa() {
  if (!initSupa()) return;
  try {
    const hiveRows = DB.hives.map(h => ({
      id:h.id, type:h.type, name:h.name,
      queen_status:h.queen_status||'unknown', strength:h.strength||3,
      notes:h.notes||'', log:h.log||[]
    }));
    const graftRows = DB.grafts.map(g => ({
      id:g.id, date:g.date, protocol:g.protocol,
      breeder_id:g.breeder_id||null, starter_id:g.starter_id||null,
      grafted:g.grafted||0, notes:g.notes||'',
      movements:g.movements||[], finisher_records:g.finisher_records||[]
    }));
    await Promise.all([
      supaUpsert('qct_hives', hiveRows),
      supaUpsert('qct_grafts', graftRows)
    ]);
    const dot = document.getElementById('db-dot');
    if (dot) dot.className = 'db-dot ok';
  } catch(e) {
    console.error('Push failed:', e);
    toast('Could not save to Supabase: ' + e.message);
    const dot = document.getElementById('db-dot');
    if (dot) dot.className = 'db-dot err';
  }
}

async function deleteFromSupa(table, id) {
  if (!initSupa()) return;
  await supaDelete(table, id);
}

// Wrap save() to also push to Supabase
// save() defined above — pushes local + supabase
// ═══════════════════════════════════════════════════════
// PIN LOCK
// ═══════════════════════════════════════════════════════
let pinBuffer = '';
let pinUnlocked = false;

function getStoredPin() { return localStorage.getItem('qct_pin') || ''; }
function savePin(p)     { localStorage.setItem('qct_pin', p); }

function showPinScreen(mode) {
  // mode: 'unlock' | 'setup'
  const hasPin = !!getStoredPin();
  const app = document.getElementById('app');
  app.innerHTML = '';

  // Build full-screen pin overlay
  const div = document.createElement('div');
  div.className = 'pin-screen';
  div.id = 'pin-screen';
  div.innerHTML = `
    <div class="pin-title">Queen Cell Tracker</div>
    <div class="pin-sub" id="pin-sub">${mode==='setup' ? 'Set a 4-digit PIN' : 'Enter your PIN'}</div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-pad">
      ${[1,2,3,4,5,6,7,8,9,'',0,'del'].map(k => k==='' ? '<div></div>' :
        `<button class="pin-key${k==='del'?' del':''}" onclick="pinPress('${k}')">${k==='del'?'&#9003;':k}</button>`
      ).join('')}
    </div>`;
  document.body.appendChild(div);
  pinBuffer = '';
}

function pinPress(key) {
  const hasPin = !!getStoredPin();
  if (key === 'del') {
    pinBuffer = pinBuffer.slice(0, -1);
  } else if (pinBuffer.length < 4) {
    pinBuffer += key;
  }
  // Update dots
  for (let i=0; i<4; i++) {
    const d = document.getElementById('pd'+i);
    if (d) d.classList.toggle('filled', i < pinBuffer.length);
  }
  if (pinBuffer.length === 4) {
    setTimeout(() => {
      const stored = getStoredPin();
      if (!stored) {
        // First time setup — save pin
        savePin(pinBuffer);
        removePinScreen();
        toast('PIN set');
      } else if (pinBuffer === stored) {
        removePinScreen();
      } else {
        // Wrong PIN
        const err = document.getElementById('pin-error');
        if (err) err.textContent = 'Incorrect PIN';
        pinBuffer = '';
        for (let i=0; i<4; i++) {
          const d = document.getElementById('pd'+i);
          if (d) d.classList.remove('filled');
        }
      }
    }, 120);
  }
}

function removePinScreen() {
  pinUnlocked = true;
  const el = document.getElementById('pin-screen');
  if (el) el.remove();
  render();
}

function changePin() {
  // Called from settings — clear stored pin and re-show setup
  localStorage.removeItem('qct_pin');
  pinUnlocked = false;
  showPinScreen('setup');
}

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
(async () => {
  load();
  // Show PIN screen first
  const hasPin = !!getStoredPin();
  if (hasPin) {
    showPinScreen('unlock');
  } else {
    showPinScreen('setup');
  }
  // Sync from Supabase in background
  if (DB.supaUrl && DB.supaKey) {
    const ok = await syncFromSupa();
    if (ok && pinUnlocked) render(); // refresh if already unlocked
  }
})();
