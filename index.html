}

function saveAssign(gid){
  const g=gById(gid);if(!g)return;
  const d=dayjs(g.date);
  const estCap=d.add(5,'day').format('YYYY-MM-DD');const estOut=d.add(10,'day').format('YYYY-MM-DD');
  let any=false;
  (g.starters||[]).forEach(s=>{
    const accepted=assignDraft[s.hive_id+'_accepted'];
    if(accepted!=null&&accepted!=='')s.cells_accepted=+accepted;

    // First, remove this starter's existing contribution from all finishers
    // (we're about to rebuild it from the current draft rows)
    (g.finishers||[]).forEach(f=>{
      if(!f.sources)return;
      const exS=f.sources.find(x=>x.sid===s.hive_id);
      if(exS){ f.cells_received=Math.max(0,(f.cells_received||0)-exS.count); f.sources=f.sources.filter(x=>x.sid!==s.hive_id); }
    });

    // Now re-add from the current draft rows
    const rows=assignDraft[s.hive_id]||[];
    rows.forEach(row=>{
      const cells=+row.cells;const finId=row.fin;
      if(!cells||!finId)return;
      const ex=(g.finishers||[]).find(f=>f.hive_id===finId);
      if(ex){ex.cells_received=(ex.cells_received||0)+cells;if(!ex.sources)ex.sources=[];ex.sources.push({sid:s.hive_id,count:cells});}
      else{if(!g.finishers)g.finishers=[];g.finishers.push({hive_id:finId,cells_received:cells,sources:[{sid:s.hive_id,count:cells}],capped:null,out:null,mated:null,capped_date:estCap,out_date:estOut});}
      any=true;
      row.saved=true;
    });
    if(accepted!=null&&accepted!=='')any=true;
  });
  // Drop any finisher records that ended up with zero cells (e.g. row was cleared to blank)
  g.finishers=(g.finishers||[]).filter(f=>(f.cells_received||0)>0);
  if(!any){toast('Enter accepted cells or assign to a finisher');return;}
  stamp(g);save();toast('Saved');assignDraft={};renderRecPanel(gid);
}

function saveExtra(gid){
  const g=gById(gid);if(!g)return;
  const finId=document.getElementById('ef')?.value;const cells=+document.getElementById('ec')?.value;
  if(!finId){toast('Select a finisher');return;}if(!cells){toast('Enter cell count');return;}
  const d=dayjs(g.date);
  const ex=(g.finishers||[]).find(f=>f.hive_id===finId);
  if(ex){ex.cells_received=(ex.cells_received||0)+cells;}
  else{if(!g.finishers)g.finishers=[];g.finishers.push({hive_id:finId,cells_received:cells,sources:[],capped:null,out:null,mated:null,capped_date:d.add(5,'day').format('YYYY-MM-DD'),out_date:d.add(10,'day').format('YYYY-MM-DD')});}
  stamp(g);save();toast('Added');renderRecPanel(gid);
}

function updFin(gid,i,k,v){const g=gById(gid);if(!g)return;g.finishers[i][k]=v;stamp(g);save();}
function remFin(gid,i){const g=gById(gid);if(!g)return;g.finishers.splice(i,1);stamp(g);save();renderRecPanel(gid);}
function addYard2(gid){const g=gById(gid);if(!g)return;if(!g.yards)g.yards=[];g.yards.push({fid:'',cells:'',yard:''});stamp(g);save();renderRecPanel(gid);}
function updYard2(gid,yi,k,v){const g=gById(gid);if(!g||!g.yards||!g.yards[yi])return;g.yards[yi][k]=v;stamp(g);save();}
function remYard2(gid,yi){const g=gById(gid);if(!g||!g.yards)return;g.yards.splice(yi,1);stamp(g);save();renderRecPanel(gid);}

// HIVES
function rHives(){
  const all=DB.hives;
  const list=all.length?numSort(all).map(h=>{const cc=h.type==='breeder'?'cB':h.type==='starter'?'cS':'cF';const ll=h.log?.length?h.log[h.log.length-1]:null;const ret=h.retired;return`<div class="hrow" style="${ret?'opacity:.55':''}" onclick="openPanel('hive','${h.id}')"><div style="flex:1"><div style="font-weight:700;font-size:14px">${h.name} <span class="chip ${cc}" style="font-size:10px">${h.type}</span>${ret?'<span class="chip" style="background:#f3f4f6;color:#6b7280;font-size:10px;margin-left:4px">Retired</span>':''}</div><div class="txs">${ret?(h.retired_reason||'Retired'):(h.queen_status||'unknown')+' · Str '+(h.strength||'?')+'/5'+(ll?' · '+fmt(ll.date)+' '+ll.type:'')}</div></div><span style="color:var(--b3)">›</span></div>`;}).join(''):'<div class="empty"><p>No hives yet.</p></div>';
  return`<div class="card">
    <div class="chd">Hive Manager <span class="ml"><button class="btn bp bx" onclick="openPanel('bulk',null)">Bulk log</button></span></div>
    <div class="brow" style="margin-bottom:12px">
      <button class="btn bo bs" onclick="addHive('breeder')">+ Breeder</button>
      <button class="btn bo bs" onclick="addHive('starter')">+ Starter</button>
      <button class="btn bo bs" onclick="addHive('finisher')">+ Finisher</button>
    </div>
    ${list}
  </div>`;
}

function addHive(type){
  const m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center';
  const def=type[0].toUpperCase()+(DB.hives.filter(h=>h.type===type).length+1);
  const cc=type==='breeder'?'cB':type==='starter'?'cS':'cF';
  m.innerHTML=`<div style="background:var(--wht);border-radius:16px 16px 0 0;padding:20px 16px 36px;width:100%;max-width:680px">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
      <span class="chip ${cc}">${type}</span><span style="font-size:15px;font-weight:700">Add ${type}</span>
      <button onclick="this.closest('[style]').remove()" style="margin-left:auto;background:none;border:none;font-size:22px;cursor:pointer;color:var(--b3)">x</button>
    </div>
    <div class="field"><label>Name</label><input type="text" id="nh" value="${def}" autocomplete="off"></div>
    <button class="btn bp bb mt12" onclick="doAddHive('${type}',this)">Add ${type}</button>
  </div>`;
  m.addEventListener('click',e=>{if(e.target===m)m.remove();});
  document.body.appendChild(m);
  setTimeout(()=>{const i=document.getElementById('nh');if(i){i.focus();i.select();}},50);
}

function doAddHive(type,btn){
  const name=document.getElementById('nh')?.value.trim();
  if(!name){toast('Enter a name');return;}
  DB.hives.push({id:uid(),type,name,queen_status:'unknown',strength:3,notes:'',log:[],updated_at:new Date().toISOString()});
  btn.closest('[style]').remove();
  save();toast(name+' added');
  if(pg==='hives')render();else go('hives');
}

function renderHivePanel(id){
  const h=hById(id);if(!h)return;
  const cc=h.type==='breeder'?'cB':h.type==='starter'?'cS':'cF';
  const retired=!!h.retired;
  document.getElementById('ptitle').innerHTML=`${h.name} <span class="chip ${cc}">${h.type}</span>${retired?'<span class="chip" style="background:#f3f4f6;color:#6b7280;margin-left:6px">Retired</span>':''}`;
  document.getElementById('pactions').innerHTML=`<button class="btn bd bx" onclick="delHive('${id}')">Delete</button>`;
  const logHtml=(h.log||[]).slice().reverse().map(e=>{const types=(e.types||[e.type].filter(Boolean));const labels=types.map(t=>{const lt=LOG_TYPES.find(x=>x.v===t);return lt?lt.l:t;});return`<div class="log-entry"><div style="font-size:10px;color:var(--b3);font-weight:600">${fmtF(e.date)}</div><div style="display:flex;gap:4px;flex-wrap:wrap;margin:3px 0">${labels.map(l=>`<span class="chip cok" style="font-size:9px;padding:2px 6px">${l}</span>`).join('')}</div>${e.note?`<div class="tsm">${e.note}</div>`:''}</div>`;}).join('')||'<p class="tsm">No entries.</p>';
  document.getElementById('pbody').innerHTML=`
    ${retired?`<div class="card" style="border:1.5px solid #d1d5db;background:#f9fafb">
      <div class="chd" style="color:#6b7280">Retired</div>
      <p class="tsm">${h.retired_date?fmtF(h.retired_date)+' — ':''}${h.retired_reason||'No reason given'}</p>
      <button class="btn bo bs mt8" onclick="unretireHive('${id}')">Reactivate hive</button>
    </div>`:''}
    <div class="card"><div class="chd">Settings</div>
      <div class="r2">
        <div class="field"><label>Name</label><input type="text" value="${h.name}" onchange="updH('${id}','name',this.value)"></div>
        <div class="field"><label>Strength (1-5)</label><input type="number" min="1" max="5" value="${h.strength||3}" onchange="updH('${id}','strength',+this.value)"></div>
      </div>
      <div class="field mt12"><label>Queen Status</label>
        <select onchange="updH('${id}','queen_status',this.value)">
          <option value="queenright" ${h.queen_status==='queenright'?'selected':''}>Queenright</option>
          <option value="queenless" ${h.queen_status==='queenless'?'selected':''}>Queenless</option>
          <option value="virgin" ${h.queen_status==='virgin'?'selected':''}>Virgin queen</option>
          <option value="unknown" ${h.queen_status==='unknown'?'selected':''}>Unknown</option>
        </select></div>
      <div class="field mt12"><label>Notes</label><textarea onchange="updH('${id}','notes',this.value)">${h.notes||''}</textarea></div>
    </div>
    ${!retired?`<div class="card">
      <div class="chd">Retire this hive</div>
      <p class="tsm" style="margin-bottom:8px">Stops it appearing as available for new grafts/assignments, but keeps its history.</p>
      <div class="field"><label>Reason</label><textarea id="retire-reason" placeholder="e.g. drone layer, dead out, combined with another hive..."></textarea></div>
      <button class="btn bd bb mt8" onclick="retireHive('${id}')">Retire hive</button>
    </div>`:''}
    <div class="card"><div class="chd">Log Entry</div>
      <div class="field"><label>Date</label><input type="date" id="ld" value="${today()}"></div>
      <div class="field mt8"><label>Actions</label><div class="lch-grid">${LOG_TYPES.map(t=>`<label class="lch"><input type="checkbox" name="lt-${id}" value="${t.v}"><span>${t.l}</span></label>`).join('')}</div></div>
      <div class="field mt8"><label>Comment</label><textarea id="ln" placeholder="Notes..."></textarea></div>
      <button class="btn bp bb mt8" onclick="addLog('${id}')">Add entry</button>
    </div>
    <div class="card"><div class="chd">Log <span class="txs ml">${(h.log||[]).length} entries</span></div>${logHtml}</div>`;
}

function retireHive(id){
  const h=hById(id);if(!h)return;
  const reason=document.getElementById('retire-reason')?.value.trim();
  if(!reason){toast('Enter a reason');return;}
  h.retired=true;h.retired_reason=reason;h.retired_date=today();
  h.updated_at=new Date().toISOString();
  save();toast(h.name+' retired');renderHivePanel(id);render();
}
function unretireHive(id){
  const h=hById(id);if(!h)return;
  h.retired=false;h.retired_reason='';h.retired_date='';
  h.updated_at=new Date().toISOString();
  save();toast(h.name+' reactivated');renderHivePanel(id);render();
}

// Assign draft state — reset each time panel opens
let assignDraft={};

function renderStarterCard(sid, gid){
  const g=gById(gid);if(!g)return;
  const s=(g.starters||[]).find(x=>x.hive_id===sid);if(!s)return;
  const finishers=numSort(hByType('finisher'));
  if(!assignDraft[sid])assignDraft[sid]=[{cells:'',fin:''}];
  const accepted=s.cells_accepted!=null?s.cells_accepted:(assignDraft[sid+'_accepted']??'');
  const acceptedNum=+accepted||0;
  const alreadySent=(g.finishers||[]).reduce((a,f)=>{const src=(f.sources||[]).find(x=>x.sid===sid);return a+(src?src.count:0);},0);
  const rows=assignDraft[sid].map((row,ri)=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <input type="number" min="0" placeholder="cells" value="${row.cells||''}"
        style="width:72px;padding:8px;text-align:center;font-size:16px;font-weight:800;border:1.5px solid var(--bdr);border-radius:var(--rs);background:var(--wht)"
        oninput="setAD('${sid}',${ri},'cells',+this.value);updateLeftCounter('${sid}',${acceptedNum}-${alreadySent});refreshAllFinDropdowns('${gid}')">
      <span style="color:var(--b3)">→</span>
      <select data-fin-select="1" style="flex:1;padding:8px;font-size:14px;border:1.5px solid var(--bdr);border-radius:var(--rs);background:var(--wht)"
        onchange="setAD('${sid}',${ri},'fin',this.value);refreshAllFinDropdowns('${gid}')">
        <option value="">Select F...</option>
        ${sortedFinishersByAvail(gid).map(f=>{const av=finisherAvailable(f.id,gid);const sum=finisherAllocSummary(f.id,gid);return `<option value="${f.id}" ${row.fin===f.id?'selected':''} style="${av?'':'color:#b0b0b0'}">${av?'✓ ':'⊘ '}${hiveLabel(f)}${sum?' — '+sum:av?' available':' growing'}</option>`;}).join('')}
      </select>
      ${assignDraft[sid].length>1?`<button class="btn bd bx" onclick="removeAD('${sid}',${ri});renderStarterCard('${sid}','${gid}')">x</button>`:''}
    </div>`).join('');
  const rowsEl=document.getElementById('rows-'+sid);
  if(rowsEl)rowsEl.innerHTML=rows;
  updateLeftCounter(sid, acceptedNum-alreadySent);
}

function updateLeftCounter(sid, totalIn){
  const draft=assignDraft[sid]||[];
  const assigned=draft.reduce((a,r)=>a+(+r.cells||0),0);
  const stillLeft=totalIn-assigned;
  const el=document.getElementById('left-'+sid);
  if(el){el.textContent=stillLeft>0?stillLeft+' left':'all assigned';el.style.color=stillLeft>0?'var(--amb)':'var(--g)';}
}
function setAD(sid,ri,key,val){if(!assignDraft[sid])assignDraft[sid]=[{cells:'',fin:''}];assignDraft[sid][ri][key]=val;}

// Re-render every finisher <select> on the panel so allocation summaries stay live
// across all starter cards as the user types into any of them.
function refreshAllFinDropdowns(gid){
  document.querySelectorAll('select[data-fin-select="1"]').forEach(sel=>{
    const curVal=sel.value;
    const fins=sortedFinishersByAvail(gid);
    sel.innerHTML='<option value="">Select F...</option>'+fins.map(f=>{
      const av=finisherAvailable(f.id,gid);
      const sum=finisherAllocSummary(f.id,gid);
      const selAttr=curVal===f.id?' selected':'';
      const style=av?'':'color:#b0b0b0';
      const label=(av?'✓ ':'⊘ ')+hiveLabel(f)+(sum?' — '+sum:av?' available':' growing');
      return `<option value="${f.id}"${selAttr} style="${style}">${label}</option>`;
    }).join('');
  });
}
function addAD(sid){if(!assignDraft[sid])assignDraft[sid]=[{cells:'',fin:''}];assignDraft[sid].push({cells:'',fin:''});}
function removeAD(sid,ri){if(assignDraft[sid])assignDraft[sid].splice(ri,1);if(!assignDraft[sid]||!assignDraft[sid].length)assignDraft[sid]=[{cells:'',fin:''}];}

let _ut=null;
function updH(id,k,v){const h=hById(id);if(!h)return;h[k]=v;h.updated_at=new Date().toISOString();clearTimeout(_ut);_ut=setTimeout(()=>save(),600);}
function delHive(id){if(!confirm('Delete '+hById(id)?.name+'?'))return;DB.hives=DB.hives.filter(x=>x.id!==id);save();closePanel();render();toast('Deleted');}
function addLog(id){
  const h=hById(id);if(!h)return;
  const types=[...document.querySelectorAll(`input[name="lt-${id}"]:checked`)].map(x=>x.value);
  const note=document.getElementById('ln')?.value.trim()||'';
  if(!types.length&&!note){toast('Select action or add note');return;}
  if(!h.log)h.log=[];h.log.push({id:uid(),date:document.getElementById('ld').value,types,note});
  h.updated_at=new Date().toISOString();save();toast('Entry saved');renderHivePanel(id);
}

// BULK LOG
let bulkSel=new Set();
function renderBulkPanel(){
  document.getElementById('ptitle').textContent='Bulk Log Entry';
  document.getElementById('pactions').innerHTML='';
  bulkSel=new Set();
  const groups=['breeder','starter','finisher'].map(type=>{const hs=hByType(type);if(!hs.length)return'';const lbl=type==='breeder'?'Breeders':type==='starter'?'Starters':'Finishers';const cc=type==='breeder'?'cB':type==='starter'?'cS':'cF';return`<div style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span class="chip ${cc}">${lbl}</span><button class="btn bg bx" onclick="bSelAll('${type}')">All</button><button class="btn bo bx" onclick="bDesel('${type}')">None</button></div><div style="display:flex;flex-wrap:wrap;gap:6px">${numSort(hs).map(h=>`<button id="bs-${h.id}" class="btn bo bx" onclick="bToggle('${h.id}')">${h.name}</button>`).join('')}</div></div>`;}).join('');
  document.getElementById('pbody').innerHTML=`
    <div class="card"><div class="chd">Date & Actions</div>
      <div class="field"><label>Date</label><input type="date" id="bld" value="${today()}"></div>
      <div class="field mt8"><label>Actions</label><div class="lch-grid">${LOG_TYPES.map(t=>`<label class="lch"><input type="checkbox" name="blt" value="${t.v}"><span>${t.l}</span></label>`).join('')}</div></div>
      <div class="field mt8"><label>Comment</label><textarea id="bln" placeholder="Applies to all selected..."></textarea></div>
    </div>
    <div class="card"><div class="chd">Select Hives <span class="ml brow"><button class="btn bg bx" onclick="bSelAll('all')">All</button><button class="btn bo bx" onclick="bDesel('all')">Clear</button></span></div>
      ${groups}<div id="bcount" class="txs" style="text-align:center">0 hives selected</div>
    </div>
    <div style="padding:0 0 16px"><button class="btn bp bb" onclick="saveBulk()">Save log entry</button></div>`;
}
function bToggle(id){bulkSel.has(id)?bulkSel.delete(id):bulkSel.add(id);const b=document.getElementById('bs-'+id);if(b)b.className='btn bx '+(bulkSel.has(id)?'bp':'bo');const c=document.getElementById('bcount');if(c)c.textContent=bulkSel.size+' hive'+(bulkSel.size!==1?'s':'')+' selected';}
function bSelAll(type){(type==='all'?DB.hives:hByType(type)).forEach(h=>bulkSel.add(h.id));renderBulkPanel();}
function bDesel(type){if(type==='all')bulkSel.clear();else hByType(type).forEach(h=>bulkSel.delete(h.id));renderBulkPanel();}
function saveBulk(){
  const types=[...document.querySelectorAll('input[name="blt"]:checked')].map(x=>x.value);
  const note=document.getElementById('bln')?.value.trim()||'';const date=document.getElementById('bld')?.value||today();
  if(!types.length&&!note){toast('Select action or add note');return;}
  if(!bulkSel.size){toast('Select at least one hive');return;}
  bulkSel.forEach(hid=>{const h=hById(hid);if(!h)return;if(!h.log)h.log=[];h.log.push({id:uid(),date,types,note});h.updated_at=new Date().toISOString();});
  save();toast('Logged '+bulkSel.size+' hives');closePanel();render();
}

// CALENDAR
function rCal(){
  const G=DB.grafts;
  if(!G.length)return`<div class="card"><div class="empty"><p>No grafts yet.</p></div></div>`;
  const allD=G.flatMap(g=>[g.date,gOutDate(g)]);
  const minD=dayjs(allD.reduce((a,b)=>a<b?a:b)).subtract(2,'day');
  const days=Math.min(90,dayjs(allD.reduce((a,b)=>a>b?a:b)).add(5,'day').diff(minD,'day')+1);
  const cols=Array.from({length:days},(_,i)=>minD.add(i,'day'));
  const td=today();
  let pm='';
  const mrow=cols.map(c=>{const mo=c.format('MMM YY');if(mo!==pm){pm=mo;return`<th style="text-align:left;background:#3D5432;color:var(--gm)">${mo}</th>`;}return`<th style="background:#3D5432"></th>`;}).join('');
  const drow=cols.map(c=>{const it=c.format('YYYY-MM-DD')===td;return`<th style="padding:3px 4px;text-align:center;font-size:10px;background:${it?'var(--gm)':'var(--gl)'};color:${it?'#14532D':'var(--b3)'};font-weight:${it?'800':'400'};${it?'border-left:2px solid #14532D;border-right:2px solid #14532D;border-top:2px solid #14532D':''}">${c.format('D')}</th>`;}).join('');
  const sorted=G.slice().sort((a,b)=>{const ac=gDone(a),bc=gDone(b);return ac!==bc?ac?1:-1:b.date.localeCompare(a.date);});
  let lastId=null;
  const todayIdx=cols.findIndex(c=>c.format('YYYY-MM-DD')===td);
  const rows=sorted.flatMap(g=>{
    const B=hById(g.breeder_id);const d=dayjs(g.date);const isA=g.protocol==='autumn';
    const sm={};sm[g.date]={l:'G',s:'background:var(--g);color:var(--wht)'};
    if(isA){sm[d.add(1,'day').format('YYYY-MM-DD')]={l:'.',s:'background:var(--gl)'};sm[gOutDate(g)]={l:'Out',s:'background:var(--gm);color:#14532D;font-weight:700'};}
    else{sm[d.add(1,'day').format('YYYY-MM-DD')]={l:'F',s:'background:#bfdbfe;color:#1e40af'};[2,3,4].forEach(i=>sm[d.add(i,'day').format('YYYY-MM-DD')]={l:'.',s:'background:#bfdbfe'});sm[gCapDate(g)]={l:'Cap',s:'background:#fde68a;color:var(--ink);font-weight:700'};[6,7,8,9].forEach(i=>sm[d.add(i,'day').format('YYYY-MM-DD')]={l:'.',s:'background:#fde68a'});sm[gOutDate(g)]={l:'Out',s:'background:var(--gm);color:#14532D;font-weight:700'};sm[d.add(30,'day').format('YYYY-MM-DD')]={l:'M',s:'background:#e9d5ff;color:#6b21a8'};}
    const fins=(g.finishers||[]);const isNew=g.id!==lastId;lastId=g.id;const op=gDone(g)?'opacity:.4':'';
    const buildCell=(c,ci)=>{
      const ds=c.format('YYYY-MM-DD');const st=sm[ds];const it=ci===todayIdx;
      const tb=it?'border-left:2px solid #14532D;border-right:2px solid #14532D':'';
      return`<td style="padding:2px 3px;border:0.5px solid var(--bdr);${tb};background:${it?'#f0fdf4':'transparent'};text-align:center">${st?`<span style="border-radius:3px;padding:1px 4px;font-size:10px;${st.s}">${st.l}</span>`:''}</td>`;
    };
    if(!fins.length){
      const cells=cols.map(buildCell).join('');
      return[`<tr style="${op}" onclick="openPanel('rec','${g.id}')" class="cal-row"><td class="row-lbl" style="border-top:${isNew?'2px solid var(--g)':'none'}">${B?B.name:'?'}</td><td class="row-lbl" style="border-top:${isNew?'2px solid var(--g)':'none'};color:var(--g);font-size:9px">--</td>${cells}</tr>`];
    }
    return fins.map((f,fi)=>{const H=hById(f.hive_id);const cells=cols.map(buildCell).join('');return`<tr style="${op}" onclick="openPanel('rec','${g.id}')" class="cal-row"><td class="row-lbl" style="border-top:${fi===0&&isNew?'2px solid var(--g)':'none'}">${fi===0?B?B.name:'?':''}</td><td class="row-lbl" style="border-top:${fi===0&&isNew?'2px solid var(--g)':'none'};color:var(--g);font-size:9px">${H?H.name:'?'}</td>${cells}</tr>`;});
  }).join('');
  return`<div class="card" style="padding:12px 8px"><div class="chd">Calendar</div>
    <div id="cal-scroll" style="overflow-x:auto;-webkit-overflow-scrolling:touch">
      <table style="border-collapse:collapse;font-size:10px">
        <thead><tr><th style="background:#3D5432;color:var(--gm);padding:3px 8px">Batch</th><th style="background:#3D5432;color:var(--gm);padding:3px 8px">Hive</th>${mrow}</tr>
          <tr><td style="background:var(--gl);padding:3px 8px"></td><td style="background:var(--gl)"></td>${drow}</tr>
        </thead><tbody>${rows}</tbody>
      </table>
    </div>
    <style>.cal-row{cursor:pointer;}.cal-row:hover{opacity:.8;}</style>
  </div>`;
}

// STATS
function rStats(){
  const G=DB.grafts;
  if(!G.length)return`<div class="card"><div class="empty"><p>No data yet.</p></div></div>`;
  const tGr=G.reduce((a,g)=>a+gGrafted(g),0),tOut=G.reduce((a,g)=>a+gOut(g),0),tMt=G.reduce((a,g)=>a+gMated(g),0);
  const bp=pct(tOut,tGr),mp=pct(tMt,tGr);
  const byWeek={};G.forEach(g=>{const wk=dayjs(g.date).startOf('week').format('YYYY-MM-DD');if(!byWeek[wk])byWeek[wk]={grafted:0,out:0,mated:0,count:0};byWeek[wk].grafted+=gGrafted(g);byWeek[wk].out+=gOut(g);byWeek[wk].mated+=gMated(g);byWeek[wk].count++;});
  const wkRows=Object.entries(byWeek).sort((a,b)=>b[0].localeCompare(a[0])).map(([wk,d])=>{const p=pct(d.out,d.grafted);return`<tr><td style="padding:8px;font-size:12px;font-weight:600">Wk ${fmt(wk)}</td><td style="padding:8px;text-align:center">${d.count}</td><td style="padding:8px;text-align:center">${d.grafted}</td><td style="padding:8px;text-align:center">${d.out}</td><td style="padding:8px;text-align:center">${p!==null?`<span class="chip ${p>=70?'cok':p>=40?'cwarn':'cbad'}">${p}%</span>`:'--'}</td></tr>`;}).join('');
  const fs={};G.forEach(g=>(g.finishers||[]).forEach(f=>{if(!fs[f.hive_id])fs[f.hive_id]={in:0,out:0};fs[f.hive_id].in+=(f.cells_received||0);fs[f.hive_id].out+=(f.out||0);}));
  const fRows=Object.entries(fs).map(([fid,d])=>{const F=hById(fid);const p=pct(d.out,d.in);return`<tr><td style="padding:8px;font-size:12px;font-weight:600">${F?F.name:fid}</td><td style="padding:8px;text-align:center">${d.in}</td><td style="padding:8px;text-align:center">${d.out}</td><td style="padding:8px;text-align:center">${p!==null?`<span class="chip ${p>=70?'cok':p>=40?'cwarn':'cbad'}">${p}%</span>`:'--'}</td></tr>`;}).join('');
  const ss={};G.forEach(g=>(g.starters||[]).forEach(s=>{if(!ss[s.hive_id])ss[s.hive_id]={in:0,accepted:0,hasAccepted:false};ss[s.hive_id].in+=(s.cells_in||0);if(s.cells_accepted!=null){ss[s.hive_id].accepted+=s.cells_accepted;ss[s.hive_id].hasAccepted=true;}}));
  const sRows=Object.entries(ss).map(([sid,d])=>{const S=hById(sid);const p=d.hasAccepted?pct(d.accepted,d.in):null;return`<tr><td style="padding:8px;font-size:12px;font-weight:600">${S?S.name:sid}</td><td style="padding:8px;text-align:center">${d.in}</td><td style="padding:8px;text-align:center">${d.hasAccepted?d.accepted:'--'}</td><td style="padding:8px;text-align:center">${p!==null?`<span class="chip ${p>=70?'cok':p>=40?'cwarn':'cbad'}">${p}%</span>`:'--'}</td></tr>`;}).join('');
  return`<div class="card" style="border:2px solid var(--g)">
    <div class="lbl">Overall Breeding %</div>
    <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px"><span style="font-size:48px;font-weight:800;color:var(--g);line-height:1">${bp!==null?bp+'%':'--'}</span><span class="tsm">${tOut} out of ${tGr} grafted</span></div>
    ${pctBar(bp)}
    ${mp!==null?`<div class="lbl mt8">Mated</div><div style="font-size:28px;font-weight:800;color:var(--g)">${mp}%</div>${pctBar(mp)}`:''}
  </div>
  <div class="stats"><div class="stat"><div class="n">${G.length}</div><div class="l">Grafts</div></div><div class="stat"><div class="n">${tGr}</div><div class="l">Grafted</div></div><div class="stat"><div class="n">${tOut}</div><div class="l">Out</div></div><div class="stat"><div class="n">${tMt}</div><div class="l">Mated</div></div></div>
  <div class="card"><div class="chd">By Week</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--gl)"><th style="padding:8px;text-align:left">Week</th><th style="padding:8px">Grafts</th><th style="padding:8px">Grafted</th><th style="padding:8px">Out</th><th style="padding:8px">Rate</th></tr></thead><tbody>${wkRows}</tbody></table></div></div>
  <div class="card"><div class="chd">By Starter</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--gl)"><th style="padding:8px;text-align:left">Starter</th><th style="padding:8px">Grafted in</th><th style="padding:8px">Accepted</th><th style="padding:8px">Rate</th></tr></thead><tbody>${sRows||'<tr><td colspan="4" style="padding:12px;text-align:center;color:var(--b3)">No data yet</td></tr>'}</tbody></table></div></div>
  <div class="card"><div class="chd">By Finisher</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:var(--gl)"><th style="padding:8px;text-align:left">Finisher</th><th style="padding:8px">In</th><th style="padding:8px">Out</th><th style="padding:8px">Rate</th></tr></thead><tbody>${fRows||'<tr><td colspan="4" style="padding:12px;text-align:center;color:var(--b3)">No data yet</td></tr>'}</tbody></table></div></div>
  <div class="card"><div class="chd">Every Graft</div>${G.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(g=>{const B=hById(g.breeder_id);const p=pct(gOut(g),gGrafted(g));return`<div style="display:flex;align-items:center;gap:6px;padding:8px 0;border-bottom:1px solid var(--bdr);flex-wrap:wrap"><span style="font-weight:700;min-width:88px">${fmtF(g.date)}</span><span class="chip cB" style="font-size:10px">${B?B.name:'?'}</span><span class="txs">${gGrafted(g)} → ${gOut(g)}</span>${p!==null?`<span class="chip ${p>=70?'cok':p>=40?'cwarn':'cbad'}" style="margin-left:auto">${p}%</span>`:''}</div>`;}).join('')}</div>`;
}

// SETTINGS
function rSettings(){
  return`<div class="card"><div class="chd">Settings</div>
    <div class="lbl">PIN</div><p class="tsm" style="margin-bottom:8px">Locks the app on open.</p>
    <button class="btn bo bs" onclick="changePin()">Change PIN</button>
    <div class="dvd"></div>
    <div class="lbl">Supabase</div>
    <p class="tsm" style="margin-bottom:8px">Connect to sync across devices.</p>
    ${DB.supaUrl?`<div style="display:flex;align-items:center;gap:8px;padding:10px;background:var(--gl);border-radius:var(--rs);margin-bottom:8px"><div class="dot ok"></div><span class="tsm" style="color:var(--g);font-weight:600">Connected</span><button class="btn bg bx ml" onclick="supaLoad().then(()=>{toast('Synced');render()})">Sync now</button></div>`:''}
    <div class="field"><label>Project URL</label><input type="url" id="sbu" placeholder="https://xxxx.supabase.co" value="${DB.supaUrl}"></div>
    <div class="field mt8"><label>Anon Key</label><input type="password" id="sbk" placeholder="eyJ..." value="${DB.supaKey}"></div>
    <div class="brow mt12">
      <button class="btn bp" onclick="saveSupa()">Save & connect</button>
      ${DB.supaUrl?`<button class="btn bd bs" onclick="clrSupa()">Disconnect</button>`:''}
    </div>
    <div class="dvd"></div>
    <div class="lbl">Data</div>
    <div class="brow">
      <button class="btn bg bs" onclick="expData()">Export</button>
      <button class="btn bg bs" onclick="document.getElementById('imp').click()">Import</button>
      <input type="file" id="imp" accept=".json" style="display:none" onchange="impData(this)">
      <button class="btn bd bs" onclick="clrAll()">Clear all</button>
    </div>
    <div id="save-dot" style="width:8px;height:8px;border-radius:50%;background:var(--g);margin-top:8px;opacity:0;transition:opacity .5s"></div>
  </div>`;
}

function saveSupa(){DB.supaUrl=document.getElementById('sbu').value.trim();DB.supaKey=document.getElementById('sbk').value.trim();localStorage.setItem('qct_cfg2',JSON.stringify({url:DB.supaUrl,key:DB.supaKey}));toast('Connecting...');supaLoad().then(ok=>{if(ok){toast('Connected');render();}else toast('Could not connect');});}
function clrSupa(){DB.supaUrl='';DB.supaKey='';localStorage.removeItem('qct_cfg2');toast('Disconnected');render();}
function expData(){const b=new Blob([JSON.stringify({hives:DB.hives,grafts:DB.grafts},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='qct.json';a.click();}
function impData(i){const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);DB.hives=d.hives||[];DB.grafts=d.grafts||[];save();toast('Imported');render();}catch{toast('Invalid file');}};r.readAsText(i.files[0]);}
function clrAll(){if(!confirm('Delete ALL data?'))return;DB.hives=[];DB.grafts=[];save();toast('Cleared');render();}

// PIN
let pinBuf='',pinUnlocked=false;
function getPin(){return localStorage.getItem('qct_pin2')||'';}
function savePin(p){localStorage.setItem('qct_pin2',p);}
function showPin(mode){
  pinBuf='';
  const div=document.createElement('div');div.className='pin-screen';div.id='pin-screen';
  div.innerHTML=`<div class="pin-title">Queen Cell Tracker</div>
    <div class="pin-sub">${mode==='setup'?'Set a 4-digit PIN':'Enter your PIN'}</div>
    <div class="pin-dots">${[0,1,2,3].map(i=>`<div class="pin-dot" id="pd${i}"></div>`).join('')}</div>
    <div class="pin-err" id="pe"></div>
    <div class="pin-pad">${[1,2,3,4,5,6,7,8,9,'',0,'del'].map(k=>k===''?'<div></div>':`<button class="pin-key" onclick="pinKey('${k}')">${k==='del'?'x':k}</button>`).join('')}</div>`;
  document.body.appendChild(div);
}
function pinKey(k){
  if(k==='del'){pinBuf=pinBuf.slice(0,-1);}else if(pinBuf.length<4){pinBuf+=k;}
  [0,1,2,3].forEach(i=>{const d=document.getElementById('pd'+i);if(d)d.classList.toggle('filled',i<pinBuf.length);});
  if(pinBuf.length===4){setTimeout(()=>{const stored=getPin();if(!stored){savePin(pinBuf);rmPin();toast('PIN set');}else if(pinBuf===stored){rmPin();}else{const e=document.getElementById('pe');if(e)e.textContent='Incorrect PIN';pinBuf='';[0,1,2,3].forEach(i=>{const d=document.getElementById('pd'+i);if(d)d.classList.remove('filled');});}},100);}
}
function rmPin(){pinUnlocked=true;const el=document.getElementById('pin-screen');if(el)el.remove();render();}
function changePin(){localStorage.removeItem('qct_pin2');pinUnlocked=false;showPin('setup');}

// TOAST
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2600);}

// BOOT
(async()=>{
  loadLocal();
  const hasPin=!!getPin();
  if(hasPin){showPin('unlock');}else{showPin('setup');}
  if(DB.supaUrl&&DB.supaKey){supaLoad().then(ok=>{if(ok&&pinUnlocked)render();});}
})();
</script>
</body>
</html>
