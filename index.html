<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Queen Cell Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<style>
:root {
  --g:#6B8C5A;--gl:#EEF3EA;--gm:#B5C9AA;--ink:#1C1917;--b2:#57534E;--b3:#A8A29E;
  --wht:#FFFFFF;--cr:#F9FFF9;--bdr:#D1FAE5;--red:#DC2626;--amb:#D97706;
  --r:12px;--rs:8px;--sh:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.05);
  --nh:56px;--fn:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--fn);background:var(--cr);color:var(--ink);min-height:100vh;}
nav{position:fixed;top:0;left:0;right:0;height:var(--nh);background:#3D5432;
  display:flex;align-items:center;padding:0 14px;gap:3px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.logo{color:var(--gm);font-weight:800;font-size:17px;margin-right:6px;letter-spacing:-.3px;}
nav button{background:none;border:none;color:#86efac66;padding:7px 10px;border-radius:var(--rs);
  cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;transition:background .15s,color .15s;}
nav button.active,nav button:hover{background:rgba(134,239,172,.15);color:var(--gm);}
.nsp{flex:1;}
.dot{width:8px;height:8px;border-radius:50%;background:#4b5563;}
.dot.ok{background:var(--gm);} .dot.err{background:#f87171;}
main{padding:calc(var(--nh) + 14px) 12px 100px;max-width:680px;margin:0 auto;}
.card{background:var(--wht);border-radius:var(--r);box-shadow:var(--sh);padding:18px;margin-bottom:12px;}
.chd{font-size:15px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.ml{margin-left:auto;}
.chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
.cB{background:#f5f3ff;color:#6d28d9;} .cS{background:#eff6ff;color:#1d4ed8;}
.cF{background:var(--gl);color:var(--g);} .cok{background:var(--gl);color:var(--g);}
.cwarn{background:#fef9c3;color:#854d0e;} .cbad{background:#fff1f2;color:var(--red);}
.cstd{background:var(--gl);color:var(--g);} .caut{background:#fff7ed;color:#ea580c;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:11px;font-weight:700;color:var(--b2);text-transform:uppercase;letter-spacing:.5px;}
input,select,textarea{padding:10px 12px;border:1.5px solid var(--bdr);border-radius:var(--rs);
  font-size:15px;font-family:var(--fn);color:var(--ink);background:var(--cr);transition:border-color .15s;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:var(--g);background:var(--wht);}
textarea{resize:vertical;min-height:60px;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mt8{margin-top:8px;} .mt12{margin-top:12px;} .mt16{margin-top:16px;}
.lbl{font-size:11px;font-weight:700;color:var(--b3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border-radius:var(--rs);border:none;font-size:14px;font-weight:700;
  cursor:pointer;transition:opacity .15s,transform .1s;font-family:var(--fn);white-space:nowrap;}
.btn:active{transform:scale(.97);}
.bp{background:var(--g);color:var(--wht);} .bp:hover{opacity:.88;}
.bo{background:transparent;border:1.5px solid var(--bdr);color:var(--b2);}
.bo:hover{border-color:var(--g);color:var(--g);}
.bg{background:var(--gl);color:var(--g);} .bg:hover{background:var(--gm);}
.bd{background:#fef2f2;color:var(--red);border:1.5px solid #fecaca;}
.bs{padding:7px 13px;font-size:12px;} .bx{padding:5px 10px;font-size:11px;}
.bb{width:100%;} .badd{background:var(--gl);color:var(--g);border:1.5px dashed var(--gm);}
.brow{display:flex;gap:8px;flex-wrap:wrap;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.stat{background:var(--wht);border-radius:var(--rs);padding:12px 8px;text-align:center;box-shadow:var(--sh);}
.stat .n{font-size:24px;font-weight:800;color:var(--g);line-height:1;}
.stat .l{font-size:10px;color:var(--b3);font-weight:600;text-transform:uppercase;margin-top:3px;}
.gc{border:1.5px solid var(--bdr);border-radius:var(--rs);overflow:hidden;margin-bottom:8px;}
.gc-hd{padding:12px 14px;background:var(--gl);display:flex;align-items:flex-start;gap:8px;cursor:pointer;}
.gc-hd:hover{background:var(--gm);}
.gc-body{padding:14px;display:none;}
.gc-body.open{display:block;}
.tl{display:flex;overflow-x:auto;padding:6px 0;scrollbar-width:none;}
.tl::-webkit-scrollbar{display:none;}
.tl-n{display:flex;flex-direction:column;align-items:center;flex:1;min-width:52px;position:relative;}
.tl-n::before{content:'';position:absolute;top:13px;left:50%;right:-50%;height:2px;background:var(--bdr);z-index:0;}
.tl-n:last-child::before{display:none;}
.tl-d{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;z-index:1;border:2px solid var(--bdr);background:var(--wht);color:var(--b3);}
.tl-d.done{background:var(--g);border-color:var(--g);color:var(--wht);}
.tl-d.now{background:var(--wht);border-color:var(--g);color:var(--g);box-shadow:0 0 0 3px rgba(22,163,74,.2);}
.tl-l{font-size:9px;font-weight:700;color:var(--b2);margin-top:3px;text-align:center;}
.tl-dt{font-size:9px;color:var(--b3);text-align:center;}
.panel{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;
  background:var(--cr);transform:translateX(100%);transition:transform .25s ease;}
.panel.open{transform:translateX(0);}
.phd{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--wht);
  border-bottom:1.5px solid var(--bdr);min-height:var(--nh);position:sticky;top:0;z-index:10;}
.ptitle{font-weight:800;font-size:16px;flex:1;}
.pbody{flex:1;overflow-y:auto;padding:14px;padding-bottom:80px;}
.fr{border:1.5px solid var(--bdr);border-radius:var(--rs);padding:14px;margin-bottom:10px;background:var(--wht);}
.fr-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.cb{border:1.5px solid var(--bdr);border-radius:var(--rs);padding:8px;text-align:center;}
.cb label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--b3);display:block;margin-bottom:4px;}
.cb input{border:none;background:transparent;font-size:20px;font-weight:800;text-align:center;padding:0;width:100%;}
.cb input:focus{outline:none;}
.cb .dt{font-size:9px;font-weight:700;margin-top:2px;}
.pb-wrap{background:var(--bdr);border-radius:20px;height:6px;overflow:hidden;margin-top:4px;}
.pb{height:100%;border-radius:20px;}
.pb-good{background:var(--g);} .pb-ok{background:var(--amb);} .pb-low{background:var(--red);}
.hrow{display:flex;align-items:center;gap:10px;background:var(--gl);border:1.5px solid var(--bdr);
  border-radius:var(--rs);padding:11px 14px;cursor:pointer;transition:border-color .15s;margin-bottom:6px;}
.hrow:hover{border-color:var(--g);}
.log-entry{border-left:3px solid var(--g);padding:8px 12px;margin-bottom:8px;border-radius:0 var(--rs) var(--rs) 0;background:var(--gl);}
.lch-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.lch{display:flex;align-items:center;gap:8px;padding:9px 11px;background:var(--cr);
  border:1.5px solid var(--bdr);border-radius:var(--rs);cursor:pointer;font-size:13px;}
.lch:hover{border-color:var(--g);}
.lch input[type=checkbox]{width:16px;height:16px;accent-color:var(--g);cursor:pointer;}
.lch:has(input:checked){border-color:var(--g);background:var(--gl);}
.dvd{height:1px;background:var(--bdr);margin:12px 0;}
.tsm{font-size:13px;color:var(--b2);} .txs{font-size:11px;color:var(--b3);}
.empty{text-align:center;padding:32px;color:var(--b3);}
.due{background:var(--gl);border:1.5px solid var(--gm);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.due-hd{font-weight:800;font-size:14px;color:var(--g);margin-bottom:8px;}
.due-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.due-row:last-child{border-bottom:none;}
.proto-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pbtn{padding:12px 8px;border-radius:var(--rs);border:2px solid var(--bdr);background:var(--cr);
  cursor:pointer;text-align:center;font-weight:700;font-size:13px;color:var(--b2);font-family:var(--fn);}
.pbtn.active{border-color:var(--g);background:var(--gl);color:var(--g);}
.psub{font-size:10px;font-weight:500;color:var(--b3);display:block;margin-top:2px;}
.apy-row{border:1.5px solid var(--bdr);border-radius:var(--rs);margin-bottom:6px;overflow:hidden;}
.apy-hd{display:flex;align-items:center;gap:8px;padding:10px 12px;cursor:pointer;background:var(--gl);}
.apy-hd:hover{background:var(--gm);}
.apy-body{display:none;flex-wrap:wrap;gap:6px;padding:10px 12px;background:var(--wht);border-top:1px solid var(--bdr);}
.out-banner{background:var(--gl);border-radius:var(--rs);padding:12px 14px;margin-top:10px;}
.bbar{display:none;position:fixed;bottom:0;left:0;right:0;height:60px;
  background:#3D5432;border-top:1px solid rgba(255,255,255,.1);z-index:200;}
.bbar-inner{display:flex;height:100%;}
.bbt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;border:none;background:none;color:#86efac55;font-size:10px;font-weight:600;}
.bbt.active,.bbt:hover{color:var(--gm);}
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#3D5432;color:var(--gm);padding:11px 22px;border-radius:30px;font-size:14px;font-weight:700;
  box-shadow:0 4px 20px rgba(0,0,0,.3);transition:transform .3s;z-index:999;white-space:nowrap;pointer-events:none;}
#toast.show{transform:translateX(-50%) translateY(0);}
.pin-screen{position:fixed;inset:0;background:#3D5432;z-index:9999;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:24px;}
.pin-title{color:var(--gm);font-size:22px;font-weight:800;}
.pin-sub{color:#86efac88;font-size:14px;}
.pin-dots{display:flex;gap:14px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #86efac44;background:transparent;transition:background .15s;}
.pin-dot.filled{background:var(--gm);border-color:var(--gm);}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:220px;}
.pin-key{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:12px;
  color:var(--wht);font-size:22px;font-weight:700;padding:16px;text-align:center;cursor:pointer;font-family:var(--fn);}
.pin-key:hover{background:rgba(255,255,255,.15);}
.pin-err{color:#f87171;font-size:13px;font-weight:600;min-height:20px;}
.row-lbl{text-align:left;font-weight:700;font-size:10px;padding:4px 8px;background:var(--gl);
  white-space:nowrap;position:sticky;left:0;z-index:2;}
@media(max-width:640px){
  nav button{display:none;} .bbar{display:block;} main{padding-bottom:76px;}
  .stats{grid-template-columns:repeat(2,1fr);} .cg{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<nav>
  <div class="logo">QCT</div>
  <button class="active" onclick="go('dash')">Home</button>
  <button onclick="go('graft')">Graft</button>
  <button onclick="go('hives')">Hives</button>
  <button onclick="go('cal')">Calendar</button>
  <button onclick="go('stats')">Stats</button>
  <button onclick="go('settings')">Settings</button>
  <div class="nsp"></div>
  <div class="dot" id="dot"></div>
</nav>
<main id="app"></main>
<div class="bbar"><div class="bbar-inner">
  <button class="bbt active" onclick="go('dash')">H<br>Home</button>
  <button class="bbt" onclick="go('graft')">+<br>Graft</button>
  <button class="bbt" onclick="go('hives')">B<br>Hives</button>
  <button class="bbt" onclick="go('cal')">C<br>Cal</button>
  <button class="bbt" onclick="go('stats')">%<br>Stats</button>
  <button class="bbt" onclick="go('settings')">S<br>More</button>
</div></div>
<div class="panel" id="main-panel">
  <div class="phd">
    <button class="btn bg bs" onclick="closePanel()">Back</button>
    <div class="ptitle" id="ptitle"></div>
    <div id="pactions"></div>
  </div>
  <div class="pbody" id="pbody"></div>
</div>
<div id="toast"></div>
<script>
const LOG_TYPES=[
  {v:'inspection',l:'Inspection'},{v:'e-cell',l:'E-cell check'},
  {v:'ss-cell',l:'SS cell check'},{v:'sugar-syrup',l:'Sugar syrup'},
  {v:'add-brood',l:'Add brood'},{v:'brood-up',l:'Brood up'},
  {v:'swarm-check',l:'Swarm check'},{v:'super-on',l:'Super on'},
  {v:'rq',l:'RQ'},{v:'queen-event',l:'Queen event'},
];

// STATE
let DB={hives:[],grafts:[],supaUrl:'',supaKey:''};
let pg='dash',panelMode=null,panelId=null,draft=null;

// PERSIST
function save(){
  try{
    localStorage.setItem('qct3',JSON.stringify({hives:DB.hives,grafts:DB.grafts}));
    showSaved();
  }catch(e){toast('Save error: '+e.message);}
  supaPush();
}
function showSaved(){
  const el=document.getElementById('save-dot');
  if(el){el.style.opacity='1';setTimeout(()=>el.style.opacity='0',2000);}
}
function loadLocal(){
  try{
    const r=localStorage.getItem('qct3');
    if(r){const d=JSON.parse(r);DB.hives=d.hives||[];DB.grafts=d.grafts||[];}
    const c=localStorage.getItem('qct_cfg2');
    if(c){const x=JSON.parse(c);DB.supaUrl=x.url||'';DB.supaKey=x.key||'';}
  }catch(e){console.error(e);}
}

// SUPABASE
function supaHdr(){return{'apikey':DB.supaKey,'Authorization':'Bearer '+DB.supaKey,'Content-Type':'application/json','Prefer':'return=minimal'};}
function supaBase(t){return DB.supaUrl.replace(/\/$/,'')+'/rest/v1/'+t;}
async function supaLoad(){
  if(!DB.supaUrl||!DB.supaKey)return;
  try{
    const[hr,gr]=await Promise.all([
      fetch(supaBase('qct_hives')+'?select=*',{headers:supaHdr()}),
      fetch(supaBase('qct_grafts')+'?select=*',{headers:supaHdr()})
    ]);
    if(!hr.ok||!gr.ok)throw new Error('Fetch failed');
    const rh=await hr.json(),rg=await gr.json();
    // Merge: keep local if newer
    const merge=(local,remote)=>{
      const m={};
      local.forEach(x=>m[x.id]=x);
      remote.forEach(x=>{
        const l=m[x.id];
        if(!l){m[x.id]=x;return;}
        const lt=l.updated_at?new Date(l.updated_at).getTime():0;
        const rt=x.updated_at?new Date(x.updated_at).getTime():0;
        if(rt>lt)m[x.id]=x;
      });
      return Object.values(m);
    };
    DB.hives=merge(DB.hives,rh);
    DB.grafts=merge(DB.grafts,rg);
    localStorage.setItem('qct3',JSON.stringify({hives:DB.hives,grafts:DB.grafts}));
    setDot(true);
  }catch(e){console.error('Supa load:',e);setDot(false);}
}
async function supaPush(){
  if(!DB.supaUrl||!DB.supaKey)return;
  try{
    const ts=new Date().toISOString();
    const hr=DB.hives.map(h=>({id:h.id,type:h.type,name:h.name,queen_status:h.queen_status||'unknown',
      strength:h.strength||3,notes:h.notes||'',log:h.log||[],updated_at:h.updated_at||ts}));
    const gr=DB.grafts.map(g=>({id:g.id,date:g.date,protocol:g.protocol,breeder_id:g.breeder_id,
      starters:g.starters||[],finishers:g.finishers||[],notes:g.notes||'',updated_at:g.updated_at||ts}));
    await Promise.all([
      fetch(supaBase('qct_hives'),{method:'POST',headers:{...supaHdr(),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(hr)}),
      fetch(supaBase('qct_grafts'),{method:'POST',headers:{...supaHdr(),'Prefer':'resolution=merge-duplicates,return=minimal'},body:JSON.stringify(gr)}),
    ]);
    setDot(true);
  }catch(e){setDot(false);}
}
function setDot(ok){const d=document.getElementById('dot');if(d)d.className='dot '+(ok?'ok':'err');}

// HELPERS
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function today(){return dayjs().format('YYYY-MM-DD');}
function fmt(d){return d?dayjs(d).format('D MMM'):'--';}
function fmtF(d){return d?dayjs(d).format('D MMM YY'):'--';}
function isPast(d){return d<today();}
function isToday(d){return d===today();}
function hById(id){return DB.hives.find(h=>h.id===id);}
function hByType(t){return DB.hives.filter(h=>h.type===t);}
function gById(id){return DB.grafts.find(g=>g.id===id);}
function dayN(d){return['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dayjs(d).day()];}
function relDay(d){
  const diff=dayjs(d).diff(dayjs(today()),'day');
  if(diff===0)return'Today';
  if(diff===1)return'Tomorrow';
  if(diff===-1)return'Yesterday';
  if(diff>1&&diff<7)return dayN(d);
  return null;
}
function isWknd(d){const day=dayjs(d).day();return day===0||day===6;}
function numSort(arr){return arr.slice().sort((a,b)=>{const na=parseInt(a.name.replace(/[^0-9]/g,''))||0,nb=parseInt(b.name.replace(/[^0-9]/g,''))||0;return na!==nb?na-nb:a.name.localeCompare(b.name);});}
function hiveLabel(h){
  if(!h) return '?';
  const note=(h.notes||'').trim();
  if(!note) return h.name;
  const short=note.length>24?note.slice(0,24)+'…':note;
  return h.name+' — '+short;
}

// Summarise what's already allocated into a finisher for this graft (saved + in-progress draft)
function finisherAllocSummary(finisherId, gid){
  const g=gById(gid);if(!g)return '';
  const parts=[];
  let total=0;
  // Saved sources from finisher records
  const f=(g.finishers||[]).find(x=>x.hive_id===finisherId);
  if(f && f.sources){
    f.sources.forEach(src=>{
      const S=hById(src.sid);
      parts.push((S?S.name:'?')+':'+src.count);
      total+=src.count||0;
    });
  }
  // In-progress draft rows (not yet saved) that target this finisher
  (g.starters||[]).forEach(s=>{
    const rows=assignDraft[s.hive_id]||[];
    rows.forEach(row=>{
      if(row.fin===finisherId && !row.saved && +row.cells>0){
        const S=hById(s.hive_id);
        parts.push((S?S.name:'?')+':'+row.cells+'*');
        total+=+row.cells;
      }
    });
  });
  if(!parts.length) return '';
  return parts.join(', ')+' ('+total+' in)';
}

// Finisher availability: a finisher is available if it has no active (not-yet-capped) cells in it.
// excludeGraftId: ignore that graft's own records when checking (so you can top up your own batch freely)
function finisherAvailable(finisherId, excludeGraftId){
  const h=hById(finisherId);
  if(h && h.retired) return false;
  const td=today();
  for(const g of DB.grafts){
    if(excludeGraftId && g.id===excludeGraftId) continue;
    const f=(g.finishers||[]).find(x=>x.hive_id===finisherId);
    if(!f) continue;
    const outDate=f.out_date || gOutDate(g);
    if(outDate < td) continue; // fully out already, ignore
    const capDate=f.capped_date || gCapDate(g);
    if(capDate > td) return false; // still growing — unavailable
  }
  return true;
}
function sortedFinishersByAvail(excludeGraftId){
  const sorted=numSort(hByType('finisher'));
  return sorted.slice().sort((a,b)=>{
    const aOk=finisherAvailable(a.id,excludeGraftId)?0:1;
    const bOk=finisherAvailable(b.id,excludeGraftId)?0:1;
    if(aOk!==bOk) return aOk-bOk;
    return numSort([a,b]).indexOf(a) - numSort([a,b]).indexOf(b);
  });
}
function pct(n,d){return d?Math.round(n/d*100):null;}
function pctBar(p){if(p===null)return'';const c=p>=70?'pb-good':p>=40?'pb-ok':'pb-low';return`<div style="display:flex;align-items:center;gap:6px;margin-top:4px"><div class="pb-wrap" style="flex:1"><div class="pb ${c}" style="width:${p}%"></div></div><span style="font-size:11px;font-weight:700;color:var(--b2)">${p}%</span></div>`;}
function gGrafted(g){const s=(g.starters||[]).reduce((a,x)=>a+(x.cells_in||0),0);return s||(g.grafted||0);}
function gOut(g){return(g.finishers||[]).reduce((a,f)=>a+(f.out||0),0);}
function gMated(g){return(g.finishers||[]).reduce((a,f)=>a+(f.mated||0),0);}
function gOutDate(g){return g.protocol==='autumn'?dayjs(g.date).add(2,'day').format('YYYY-MM-DD'):dayjs(g.date).add(10,'day').format('YYYY-MM-DD');}
function gCapDate(g){return dayjs(g.date).add(5,'day').format('YYYY-MM-DD');}
function gDone(g){return gOutDate(g)<today();}
function stamp(g){g.updated_at=new Date().toISOString();}

// NAV
const PAGES=['dash','graft','hives','cal','stats','settings'];
function go(p){
  pg=p;
  document.querySelectorAll('nav button').forEach((b,i)=>b.classList.toggle('active',PAGES[i]===p));
  document.querySelectorAll('.bbt').forEach((b,i)=>b.classList.toggle('active',PAGES[i]===p));
  render();
  if(p==='cal') requestAnimationFrame(()=>requestAnimationFrame(()=>centreCalToday(3)));
}
function centreCalToday(retries){
  const scroller=document.getElementById('cal-scroll');
  if(!scroller){ if(retries>0) setTimeout(()=>centreCalToday(retries-1),100); return; }
  const ths=[...scroller.querySelectorAll('thead tr:nth-child(2) th')];
  const todayTh=ths.find(th=>th.style.borderLeft && th.style.borderLeft.includes('14532D'));
  if(!todayTh || scroller.clientWidth===0){
    if(retries>0) setTimeout(()=>centreCalToday(retries-1),100);
    return;
  }
  const target=todayTh.offsetLeft - (scroller.clientWidth/2) + (todayTh.offsetWidth/2);
  scroller.scrollLeft = Math.max(0, target);
}
function render(){
  const el=document.getElementById('app');
  if(pg==='dash')el.innerHTML=rDash();
  if(pg==='graft')el.innerHTML=rGraft();
  if(pg==='hives')el.innerHTML=rHives();
  if(pg==='cal')el.innerHTML=rCal();
  if(pg==='stats')el.innerHTML=rStats();
  if(pg==='settings')el.innerHTML=rSettings();
}
function openPanel(mode,id){
  panelMode=mode;panelId=id;
  if(mode==='rec'){assignDraft={};renderRecPanel(id);}
  if(mode==='hive')renderHivePanel(id);
  if(mode==='bulk')renderBulkPanel();
  document.getElementById('main-panel').classList.add('open');
}
function closePanel(){document.getElementById('main-panel').classList.remove('open');panelMode=null;panelId=null;}

// DASHBOARD
function rDash(){
  const G=DB.grafts;
  const tGr=G.reduce((a,g)=>a+gGrafted(g),0);
  const tOut=G.reduce((a,g)=>a+gOut(g),0);
  const tMt=G.reduce((a,g)=>a+gMated(g),0);
  const sp=pct(tOut,tGr);
  const onGo=G.filter(g=>!gDone(g)).reduce((a,g)=>a+(g.finishers||[]).reduce((b,f)=>b+Math.max(0,(f.cells_received||0)-(f.out||0)),0),0);
  const due=[];
  G.forEach(g=>{
    const d=dayjs(g.date);
    const checks=g.protocol==='autumn'
      ?[{l:'Out',date:gOutDate(g),done:(g.finishers||[]).some(f=>f.out!=null)}]
      :[{l:'Assign finishers',date:d.add(1,'day').format('YYYY-MM-DD'),done:(g.finishers||[]).length>0},
        {l:'Capping check',date:gCapDate(g),done:(g.finishers||[]).some(f=>f.capped!=null)},
        {l:'Cells out',date:gOutDate(g),done:(g.finishers||[]).some(f=>f.out!=null)},
        {l:'Mated check',date:d.add(30,'day').format('YYYY-MM-DD'),done:(g.finishers||[]).some(f=>f.mated!=null)}];
    for(const c of checks){if(c.done)continue;const diff=dayjs(c.date).diff(dayjs(),'day');if(diff<=3&&diff>=-2){due.push({g,c,diff});break;}}
  });
  const dueBanner=due.length?`<div class="due" style="border-width:2px"><div class="due-hd" style="font-size:16px;margin-bottom:10px">⚠ Action needed</div>${due.map(({g,c,diff})=>{const B=hById(g.breeder_id);const rd=relDay(c.date);const urgent=diff<=0;const bg=diff<0?'#fee2e2':diff===0?'#fef3c7':'var(--gl)';const txt=diff<0?'var(--red)':diff===0?'#b45309':'var(--g)';const lb=diff<0?Math.abs(diff)+'d overdue':rd||fmt(c.date);return`<div class="due-row" style="background:${bg};border-radius:var(--rs);padding:12px;border-bottom:none;margin-bottom:8px">
    <div style="flex:1">
      <strong style="font-size:14px">${fmtF(g.date)} — ${B?B.name:'?'}</strong>
      <div class="tsm" style="margin-top:2px">${c.l}</div>
    </div>
    <div style="text-align:center">
      <div style="font-size:20px;font-weight:800;color:${txt};line-height:1">${lb}</div>
    </div>
    <button class="btn bp bs" onclick="openPanel('rec','${g.id}')">Open</button>
  </div>`;}).join('')}</div>`:'';;
  const active=G.filter(g=>!gDone(g)).sort((a,b)=>b.date.localeCompare(a.date));
  const completed=G.filter(g=>gDone(g)).sort((a,b)=>b.date.localeCompare(a.date));
  const bC=hByType('breeder').length,sC=hByType('starter').length,fC=hByType('finisher').length;
  return`${dueBanner}
    <div class="stats">
      <div class="stat"><div class="n">${G.length}</div><div class="l">Grafts</div></div>
      <div class="stat"><div class="n">${onGo}</div><div class="l">On the go</div></div>
      <div class="stat"><div class="n">${tOut}</div><div class="l">Out</div></div>
      <div class="stat"><div class="n">${sp!==null?sp+'%':'--'}</div><div class="l">Season %</div></div>
    </div>
    <div class="card">
      <div class="chd">Graft Batches <span class="ml"><button class="btn bp bx" onclick="go('graft')">+ New graft</button></span></div>
      ${active.length?active.map(rGraftCard).join(''):(completed.length?'<p class="tsm" style="padding:8px 0">No active batches.</p>':'<div class="empty"><p>No grafts yet.</p></div>')}
      ${completed.length?`<div style="margin-top:${active.length?'10px':'0'}">
        <div style="display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--gl);border-radius:var(--rs);cursor:pointer"
          onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.chev').textContent=this.nextElementSibling.style.display==='none'?'›':'⌄'">
          <span style="font-size:13px;font-weight:700;color:var(--b2)">Completed batches</span>
          <span class="chip" style="background:var(--wht);color:var(--b2)">${completed.length}</span>
          <span class="chev ml" style="color:var(--b3);font-size:16px">›</span>
        </div>
        <div style="display:none;margin-top:8px;opacity:.7">
          ${completed.map(rGraftCard).join('')}
        </div>
      </div>`:''}
    </div>
    <div class="card">
      <div class="chd">Apiary <span class="txs">${bC}B · ${sC}S · ${fC}F</span>
        <span class="ml"><button class="btn bg bx" onclick="go('hives')">Manage</button></span></div>
      ${rApiary()}
    </div>`;
}

function rApiary(){
  if(!DB.hives.length)return`<p class="tsm">No hives. <a href="#" onclick="go('hives')" style="color:var(--g)">Add hives</a></p>`;
  return['breeder','starter','finisher'].map(type=>{
    const hs=hByType(type);if(!hs.length)return'';
    const lbl=type==='breeder'?'Breeders':type==='starter'?'Starters':'Finishers';
    const cc=type==='breeder'?'cB':type==='starter'?'cS':'cF';
    const eid='apy-'+type;
    return`<div class="apy-row">
      <div class="apy-hd" onclick="const el=document.getElementById('${eid}');const open=el.style.display==='flex';el.style.display=open?'none':'flex';this.lastElementChild.textContent=open?'>':'v'">
        <span class="chip ${cc}">${lbl}</span>
        <span style="font-size:13px;font-weight:600;color:var(--b2)">${hs.length} hive${hs.length!==1?'s':''}</span>
        <span style="margin-left:auto;color:var(--b3)">></span>
      </div>
      <div id="${eid}" class="apy-body" style="display:none">
        ${numSort(hs).map(h=>`<button class="btn bg bx" onclick="openPanel('hive','${h.id}')">${h.name}</button>`).join('')}
      </div>
    </div>`;
  }).join('');
}

function gNumber(g){
  // Stable graft number based on chronological order (1 = earliest date)
  const allSorted=DB.grafts.slice().sort((a,b)=>a.date.localeCompare(b.date)||a.id.localeCompare(b.id));
  return allSorted.findIndex(x=>x.id===g.id)+1;
}

function rGraftCard(g){
  const B=hById(g.breeder_id);
  const outDate=gOutDate(g);const tGr=gGrafted(g),tOut=gOut(g);const gp=pct(tOut,tGr);
  const done=gDone(g);const cellsDue=(g.finishers||[]).reduce((a,f)=>a+Math.max(0,(f.cells_received||0)-(f.out||0)),0);
  const wd=dayN(outDate);const wknd=isWknd(outDate);
  const isA=g.protocol==='autumn';const d=dayjs(g.date);
  const stages=isA?[{l:'Graft',d:g.date},{l:'Out',d:outDate}]
    :[{l:'Graft',d:g.date},{l:'Finishers',d:d.add(1,'day').format('YYYY-MM-DD')},{l:'Capped',d:gCapDate(g)},{l:'Out',d:outDate},{l:'Mated',d:d.add(30,'day').format('YYYY-MM-DD')}];
  const tl=stages.map(s=>{const c=isPast(s.d)?'done':isToday(s.d)?'now':'';return`<div class="tl-n"><div class="tl-d ${c}">${isPast(s.d)?'v':'o'}</div><div class="tl-l">${s.l}</div><div class="tl-dt">${fmt(s.d)}</div></div>`;}).join('');
  const starterBoxes=(g.starters||[]).map(s=>{const H=hById(s.hive_id);const sent=(g.finishers||[]).reduce((a,f)=>{const src=(f.sources||[]).find(x=>x.sid===s.hive_id);return a+(src?src.count:0);},0);const sp2=pct(sent,s.cells_in||0);return`<div style="background:var(--gl);border:1px solid var(--gm);border-radius:var(--rs);padding:5px 8px;text-align:center;min-width:52px"><div style="font-size:11px;font-weight:700;color:var(--g)">${H?H.name:'?'}</div><div class="txs">${s.cells_in||0} in</div>${sp2!==null?`<div style="font-size:10px;font-weight:700;color:${sp2>=70?'var(--g)':sp2>=40?'var(--amb)':'var(--red)'}">${sp2}%</div>`:''}</div>`;}).join('');
  const finBoxes=(g.finishers||[]).map(f=>{const H=hById(f.hive_id);const fp=pct(f.out||0,f.cells_received||0);
    const estCap2=f.capped_date||gCapDate(g);
    let stg,stgC;
    if(f.out!=null&&f.out>0){stg='Out';stgC='var(--g)';}
    else if((f.capped!=null&&f.capped>0)||estCap2<=today()){stg='Capped';stgC='#92400e';}
    else{stg='Larval';stgC='#1e40af';}
    return`<div style="background:var(--gl);border:1px solid var(--gm);border-radius:var(--rs);padding:5px 8px;text-align:center;min-width:52px"><div style="font-size:11px;font-weight:700;color:var(--g)">${H?H.name:'?'}</div><div style="font-size:9px;font-weight:700;color:${stgC}">${stg}</div><div class="txs">${f.cells_received||0} in</div><div style="font-size:14px;font-weight:800;color:${fp===null?'var(--b3)':fp>=70?'var(--g)':fp>=40?'var(--amb)':'var(--red)'}">${f.out??'--'}</div>${fp!==null?`<div style="font-size:10px;font-weight:700;color:${fp>=70?'var(--g)':fp>=40?'var(--amb)':'var(--red)'}">${fp}%</div>`:''}</div>`;}).join('');
  return`<div class="gc">
    <div class="gc-hd" onclick="this.nextElementSibling.classList.toggle('open')">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          <span class="chip cstd" style="background:var(--g);color:var(--wht)">Graft ${gNumber(g)}</span>
          <strong style="font-size:14px">${fmtF(g.date)}</strong>
          <span class="chip ${isA?'caut':'cstd'}">${isA?'Autumn':'Standard'}</span>
          <span class="chip cB" style="font-size:10px">${B?B.name:'?'}</span>
        </div>
        <div style="margin-top:6px">
          <span class="txs">Out:</span>
          <span style="font-size:22px;font-weight:800;color:${wknd?'var(--red)':done?'var(--b3)':'var(--g)'};margin-left:4px">${relDay(outDate)||wd} ${fmt(outDate)}</span>
          ${wknd&&!done?' <span style="color:var(--red);font-size:10px;font-weight:700"> Weekend</span>':''}${done?' <span class="txs">Done</span>':''}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        ${!done&&cellsDue>0?`<div style="font-size:20px;font-weight:800;color:var(--g);line-height:1">${cellsDue}</div><div style="font-size:9px;color:var(--b3);text-transform:uppercase">cells out</div>`:''}
        ${gp!==null?`<span class="chip ${gp>=70?'cok':gp>=40?'cwarn':'cbad'}" style="margin-top:2px">${gp}%</span>`:''}

          <span style="font-size:12px;font-weight:700">Starters → Finishers</span>
          <span class="chev ml" style="color:var(--b3)">›</span>
        </div>

          onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.chev').textContent=this.nextElementSibling.style.display==='none'?'›':'⌄'">
          <span style="font-size:12px;font-weight:700">Yard Allocation</span>
          <span class="chev ml" style="color:var(--b3)">›</span>
        </div>
        <div style="display:none;padding:10px 12px">
          ${g.yards.map(y=>{const F=hById(y.fid);return`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px"><span class="chip cF" style="font-size:10px">${F?F.name:'?'}</span><strong>${y.cells||0}</strong><span style="color:var(--b3)">→</span><span>${y.yard||'(no yard set)'}</span></div>`;}).join('')}
        </div>
      </div>`:''}

      <div class="dvd"></div>
      <div class="brow">
        <button class="btn bp bs" onclick="openPanel('rec','${g.id}')">Record / update</button>
        <button class="btn bo bs" onclick="startEdit('${g.id}')">Edit</button>
        <button class="btn bd bs" onclick="delGraft('${g.id}')">Delete</button>
      </div>
    </div>
  </div>`;
}

// GRAFT FORM
function initDraft(existing){
  if(existing){draft={...existing,starters:(existing.starters||[]).map(s=>({...s}))};}
  else{draft={id:null,date:today(),protocol:'standard',breeder_id:hByType('breeder')[0]?.id||'',starters:[],notes:'',grafted:0};}
}
function startEdit(id){initDraft(gById(id));go('graft');}

function rGraft(){
  if(!draft)initDraft(null);
  const f=draft;
  const breeders=hByType('breeder').filter(h=>!h.retired);
  const starters=numSort(hByType('starter').filter(h=>!h.retired));
  const isA=f.protocol==='autumn';
  if(!breeders.length)return`<div class="card"><div class="chd">Set up hives first</div><p class="tsm">Add at least one breeder.</p><button class="btn bp mt12" onclick="go('hives')">Set up hives</button></div>`;
  const d=dayjs(f.date);
  const outDate=isA?d.add(2,'day').format('YYYY-MM-DD'):d.add(10,'day').format('YYYY-MM-DD');
  const capDate=isA?null:d.add(5,'day').format('YYYY-MM-DD');
  const wd=dayN(outDate);const wknd=isWknd(outDate);
  const stages=isA?[{l:'Graft',d:f.date},{l:'Out',d:outDate}]
    :[{l:'Graft',d:f.date},{l:'Finishers',d:d.add(1,'day').format('YYYY-MM-DD')},{l:'Capped',d:capDate},{l:'Out',d:outDate},{l:'Mated',d:d.add(30,'day').format('YYYY-MM-DD')}];
  const tl=stages.map(s=>{const c=isPast(s.d)?'done':isToday(s.d)?'now':'';return`<div class="tl-n"><div class="tl-d ${c}">${isPast(s.d)?'v':'o'}</div><div class="tl-l">${s.l}</div><div class="tl-dt">${fmt(s.d)}</div></div>`;}).join('');
  const totalCells=f.starters.reduce((a,s)=>a+(+s.cells_in||0),0);
  const saRows=starters.map(h=>{const ex=f.starters.find(s=>s.hive_id===h.id);const val=ex?.cells_in||'';return`<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--gl);border-radius:var(--rs);margin-bottom:6px">
    <span class="chip cS">${h.name}</span>
    <span class="tsm" style="flex:1">cells grafted in</span>
    <input type="number" min="0" placeholder="0" value="${val}"
      style="width:80px;padding:8px;text-align:center;font-size:18px;font-weight:800;border:1.5px solid var(--bdr);border-radius:var(--rs);background:var(--wht)"
      onchange="setSC('${h.id}',+this.value)">
  </div>`;}).join('');
  return`<div class="card">
    <div class="chd">${f.id?'Edit Graft':'New Graft'}${f.id?`<button class="btn bg bx ml" onclick="cancelGraft()">Cancel</button>`:''}</div>
    <div class="proto-row">
      <button class="pbtn ${!isA?'active':''}" onclick="draft.protocol='standard';render()">Standard<span class="psub">10 days</span></button>
      <button class="pbtn ${isA?'active':''}" onclick="draft.protocol='autumn';render()">Autumn<span class="psub">2 days</span></button>
    </div>
    <div class="tl">${tl}</div>
    <div class="out-banner">
      ${!isA?`<div style="font-size:13px;color:var(--b2);margin-bottom:4px">Capped: <strong>${dayN(capDate)} ${fmt(capDate)}</strong></div>`:''}
      <div style="font-size:15px">Cells out: <strong style="font-size:18px;color:${wknd?'var(--red)':'var(--g)'}">${wd} ${fmt(outDate)}</strong>${wknd?' <span style="color:var(--red);font-size:11px;font-weight:700">Weekend</span>':''}</div>
    </div>
    <div class="r2 mt12">
      <div class="field"><label>Graft Date</label><input type="date" value="${f.date}" onchange="draft.date=this.value;render()"></div>
      <div class="field"><label>Breeder</label>
        <select onchange="draft.breeder_id=this.value">
          <option value="">Select...</option>
          ${breeders.map(h=>`<option value="${h.id}" ${f.breeder_id===h.id?'selected':''}>${h.name}</option>`).join('')}
        </select></div>
    </div>
    ${starters.length?`<div class="mt12">
      <div class="lbl">Starters — cells grafted into each</div>
      ${saRows}
      <div style="padding:10px;background:var(--gl);border-radius:var(--rs);text-align:center">
        <span class="tsm">Total: </span><strong style="font-size:20px;color:var(--g)">${totalCells}</strong><span class="tsm"> cells grafted</span>
      </div></div>`:`<p class="tsm mt12" style="color:var(--b3)">No starters set up. <a href="#" onclick="go('hives')" style="color:var(--g)">Add starters</a></p>`}
    <div class="field mt12"><label>Notes</label><textarea placeholder="Weather, observations..." onchange="draft.notes=this.value">${f.notes||''}</textarea></div>
    <div class="brow mt12">
      <button class="btn bp" onclick="saveGraft()">Save graft</button>
      <button class="btn bg" onclick="cancelGraft()">Cancel</button>
    </div>
  </div>`;
}

function setSC(hive_id,count){
  if(!draft.starters)draft.starters=[];
  const ex=draft.starters.find(s=>s.hive_id===hive_id);
  if(count>0){if(ex)ex.cells_in=count;else draft.starters.push({hive_id,cells_in:count});}
  else{draft.starters=draft.starters.filter(s=>s.hive_id!==hive_id);}
}

function saveGraft(){
  const f=draft;
  if(!f.breeder_id){toast('Select a breeder');return;}
  const g={
    id:f.id||uid(),date:f.date,protocol:f.protocol,breeder_id:f.breeder_id,
    starters:f.starters.filter(s=>s.cells_in>0),
    finishers:f.id?(gById(f.id)?.finishers||[]):[],
    notes:f.notes||'',updated_at:new Date().toISOString()
  };
  const idx=DB.grafts.findIndex(x=>x.id===g.id);
  if(idx>=0)DB.grafts[idx]=g;else DB.grafts.unshift(g);
  save();draft=null;toast('Graft saved');go('dash');
}
function cancelGraft(){draft=null;go('dash');}
function delGraft(id){if(!confirm('Delete this graft?'))return;DB.grafts=DB.grafts.filter(g=>g.id!==id);save();toast('Deleted');render();}

// RECORD PANEL
function renderRecPanel(id){
  const g=gById(id);if(!g)return;
  const B=hById(g.breeder_id);const isA=g.protocol==='autumn';
  document.getElementById('ptitle').textContent='Graft '+gNumber(g)+' -- '+fmtF(g.date)+' -- '+(B?B.name:'?');
  document.getElementById('pactions').innerHTML=`<button class="btn bg bx" onclick="startEdit('${id}');closePanel()">Edit</button>`;
  const tGr=gGrafted(g),tOut=gOut(g),tMt=gMated(g);
  const tIn=(g.finishers||[]).reduce((a,f)=>a+(f.cells_received||0),0);
  const gp=pct(tOut,tGr);
  const finishers=numSort(hByType('finisher'));

  // Starter summary
  const stSummary=(g.starters||[]).map(s=>{
    const H=hById(s.hive_id);
    const sent=(g.finishers||[]).reduce((a,f)=>{const src=(f.sources||[]).find(x=>x.sid===s.hive_id);return a+(src?src.count:0);},0);
    const accepted=s.cells_accepted!=null?s.cells_accepted:null;
    // Starter %: cells_accepted / cells_in (acceptance rate)
    const acceptPct=accepted!=null?pct(accepted,s.cells_in||0):null;
    // Allocation %: sent to finishers / cells_accepted
    const allocPct=accepted!=null&&accepted>0?pct(sent,accepted):null;
    return`<div style="padding:10px;background:var(--gl);border-radius:var(--rs);margin-bottom:6px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
        <span class="chip cS">${H?H.name:'?'}</span>
        <span class="tsm">${s.cells_in||0} grafted in</span>
        ${accepted!=null?`<span class="tsm">· ${accepted} accepted</span>`:''}
        ${acceptPct!==null?`<span class="chip ${acceptPct>=70?'cok':acceptPct>=40?'cwarn':'cbad'}" style="margin-left:auto">${acceptPct}%</span>`:'<span class="txs" style="margin-left:auto;color:var(--b3)">acceptance not recorded</span>'}
      </div>
      ${sent>0?`<div class="txs">${sent} sent to finishers${allocPct!==null?' · '+allocPct+'% allocated':''}</div>`:''}
    </div>`;
  }).join('');

  // Assign section — one card per starter, with accepted cells confirmation + finisher rows
  const assignRows=(g.starters||[]).map(s=>{
    const H=hById(s.hive_id);
    const alreadySent=(g.finishers||[]).reduce((a,f)=>{const src=(f.sources||[]).find(x=>x.sid===s.hive_id);return a+(src?src.count:0);},0);
    const accepted = s.cells_accepted != null ? s.cells_accepted : (assignDraft[s.hive_id+'_accepted'] ?? '');
    const acceptedNum = +accepted || 0;
    const sp = acceptedNum > 0 ? pct(acceptedNum, s.cells_in||0) : null;
    // Pre-populate assignDraft rows from saved finisher sources if not already loaded for this starter
    if(!assignDraft[s.hive_id]){
      const savedRows=[];
      (g.finishers||[]).forEach(f=>{
        (f.sources||[]).forEach(src=>{
          if(src.sid===s.hive_id) savedRows.push({cells:src.count, fin:f.hive_id, saved:true});
        });
      });
      assignDraft[s.hive_id]=savedRows.length?savedRows:[{cells:'',fin:''}];
    }
    const finRows=assignDraft[s.hive_id].map((row,ri)=>`
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <input type="number" min="0" placeholder="cells" value="${row.cells||''}"
          style="width:72px;padding:8px;text-align:center;font-size:16px;font-weight:800;border:1.5px solid ${row.saved?'var(--g)':'var(--bdr)'};border-radius:var(--rs);background:${row.saved?'var(--gl)':'var(--wht)'}"
          oninput="setAD('${s.hive_id}',${ri},'cells',+this.value);updateLeftCounter('${s.hive_id}',${acceptedNum});refreshAllFinDropdowns('${id}')">
        <span style="color:var(--b3)">→</span>
        <select data-fin-select="1" style="flex:1;padding:8px;font-size:14px;border:1.5px solid ${row.saved?'var(--g)':'var(--bdr)'};border-radius:var(--rs);background:${row.saved?'var(--gl)':'var(--wht)'}"
          onchange="setAD('${s.hive_id}',${ri},'fin',this.value);refreshAllFinDropdowns('${id}')">
          <option value="">Select F...</option>
          ${sortedFinishersByAvail(id).map(f=>{const av=finisherAvailable(f.id,id);const sum=finisherAllocSummary(f.id,id);return `<option value="${f.id}" ${row.fin===f.id?'selected':''} style="${av?'':'color:#b0b0b0'}">${av?'✓ ':'⊘ '}${hiveLabel(f)}${sum?' — '+sum:av?' available':' growing'}</option>`;}).join('')}
        </select>
        ${row.saved?'<span class="chip cok" style="font-size:9px">saved</span>':''}
        ${assignDraft[s.hive_id].length>1?`<button class="btn bd bx" onclick="removeAD('${s.hive_id}',${ri});renderStarterCard('${s.hive_id}','${id}')">x</button>`:''}
      </div>`).join('');
    const finAssigned=assignDraft[s.hive_id].reduce((a,r)=>a+(+r.cells||0),0);
    const stillLeft=acceptedNum-finAssigned;
    return`<div style="background:var(--gl);border-radius:var(--rs);padding:12px;margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="chip cS">${H?H.name:'?'}</span>
        <span class="tsm">${s.cells_in||0} grafted in</span>
        ${sp!==null?`<span class="chip ${sp>=70?'cok':sp>=40?'cwarn':'cbad'}">${sp}%</span>`:''}
      </div>

        <span class="txs" style="min-width:100px">Cells accepted:</span>

        </span>
      </div>
    </div>`;
  }).join('');

  const noStarters=!(g.starters||[]).length;

  // Finisher records
  const d=dayjs(g.date);
  const finRows=(g.finishers||[]).map((f,i)=>{
    const H=hById(f.hive_id);const fp=pct(f.out||0,f.cells_received||0);
    const estCap=f.capped_date||d.add(5,'day').format('YYYY-MM-DD');
    const estOut=f.out_date||d.add(10,'day').format('YYYY-MM-DD');
    const wkndO=isWknd(estOut);
    const srcTxt=(f.sources||[]).map(s=>{const H2=hById(s.sid);return(H2?H2.name:'?')+':'+s.count;}).join(' + ');
    // Stage badge: Larval (pre-capping) -> Capped -> Out
    let stage,stageStyle;
    if(isA){ stage = (f.out!=null&&f.out>0) ? 'Out' : 'Growing'; stageStyle = stage==='Out'?'background:var(--gl);color:var(--g)':'background:#dbeafe;color:#1e40af'; }
    else if(f.out!=null&&f.out>0){ stage='Out'; stageStyle='background:var(--gl);color:var(--g)'; }
    else if((f.capped!=null&&f.capped>0) || estCap<=today()){ stage='Capped'; stageStyle='background:#fef3c7;color:#92400e'; }
    else { stage='Larval'; stageStyle='background:#dbeafe;color:#1e40af'; }
    return`<div class="fr">
      <div class="fr-hd">
        <span class="chip cF">${H?H.name:'?'}</span>
        <span class="chip" style="${stageStyle}">${stage}</span>
        ${H&&H.notes?`<span class="txs" style="font-style:italic">${H.notes}</span>`:''}
        <span class="txs">${f.cells_received||0} in${srcTxt?' ('+srcTxt+')':''}</span>
        ${fp!==null?`<span class="chip ${fp>=70?'cok':fp>=40?'cwarn':'cbad'}" style="margin-left:auto">${fp}%</span>`:''}

      </div>

        <div class="cb" style="${stage==='Out'?'background:var(--gl);border-color:var(--gm)':''}"><label>Out</label><input type="number" min="0" value="${f.out??''}" onchange="updFin('${id}',${i},'out',this.value===''?null:+this.value)"><div class="dt" style="color:${wkndO?'var(--red)':'var(--g)'}">${dayN(estOut)} ${fmt(estOut)}${wkndO?' !':''}</div></div>
      </div>

        <div class="cb" style="background:var(--gl)"><label>Mated</label><input type="number" min="0" value="${f.mated??''}" onchange="updFin('${id}',${i},'mated',this.value===''?null:+this.value)"></div>

        <div class="field" style="flex:1"><label style="font-size:9px">Out date</label><input type="date" style="font-size:12px;padding:6px 8px" value="${estOut}" onchange="updFin('${id}',${i},'out_date',this.value)"></div>

  if(!g.yards) g.yards=[];

  const outFinishers = (g.finishers||[]).filter(f=>{

  const totalOutCells = outFinishers.reduce((a,f)=>a+(f.out||0),0);
  const totalYardAllocated = g.yards.reduce((a,y)=>a+(+y.cells||0),0);
  const yardLeftGraft = totalOutCells - totalYardAllocated;
  const yardRows = g.yards.map((y,yi)=>`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
      <select style="width:64px;padding:7px;font-size:13px;font-weight:700;border:1.5px solid var(--bdr);border-radius:var(--rs);background:var(--wht)"
        onchange="updYard2('${id}',${yi},'fid',this.value)">
        <option value="">F</option>
        ${numSort(outFinishers.map(f=>hById(f.hive_id))).map(f=>`<option value="${f.id}" ${y.fid===f.id?'selected':''}>${hiveLabel(f)}</option>`).join('')}

        onchange="updYard2('${id}',${yi},'cells',+this.value)">
      <input type="text" placeholder="yard name" value="${y.yard||''}"
        style="flex:1;padding:7px 10px;font-size:14px;border:1.5px solid var(--bdr);border-radius:var(--rs);background:var(--wht)"
        onchange="updYard2('${id}',${yi},'yard',this.value)">
      <button class="btn bd bx" onclick="remYard2('${id}',${yi})">x</button>
    </div>`).join('');

  document.getElementById('pbody').innerHTML=`
    <div class="card">
      <div class="chd">Summary</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
        <div class="stat"><div class="n">${tGr}</div><div class="l">Grafted</div></div>
        <div class="stat"><div class="n">${tIn}</div><div class="l">In finishers</div></div>
        <div class="stat"><div class="n">${tOut}</div><div class="l">Out</div></div>
      </div>
      ${gp!==null?`<div class="lbl">Out / grafted</div>${pctBar(gp)}`:''}

      const allAllocated = !noStarters && (g.starters||[]).every(s=>{

        <div style="display:flex;align-items:center;gap:8px;padding:18px 18px ${startOpen?'14px':'18px'};cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.chev').textContent=this.nextElementSibling.style.display==='none'?'›':'⌄'">

    <div class="card" style="padding:0;overflow:hidden">
      <div style="display:flex;align-items:center;gap:8px;padding:18px;cursor:pointer" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';this.querySelector('.chev').textContent=this.nextElementSibling.style.display==='none'?'›':'⌄'">

      ${outFinishers.length?`
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:12px;padding:10px 12px;background:var(--gl);border-radius:var(--rs)">
