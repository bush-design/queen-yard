<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Queen Cell Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
<style>
:root {
  --amber:#D97706; --honey:#F59E0B; --gold:#FCD34D; --wax:#FEF3C7; --wax2:#FDE68A;
  --cream:#FFFBEB; --brown:#292524; --brown2:#57534E; --brown3:#A8A29E; --white:#FFFFFF; --ink:#1C1917;
  --cB-bg:#F5F3FF; --cB:#6D28D9;
  --cS-bg:#EFF6FF; --cS:#1D4ED8;
  --cF-bg:#F0FDF4; --cF:#15803D;
  --cA-bg:#FFF7ED; --cA:#EA580C;
  --red:#DC2626; --green:#16A34A; --blue:#2563EB; --purple:#7C3AED;
  --r:12px; --rs:8px; --sh:0 1px 4px rgba(0,0,0,.10),0 4px 16px rgba(0,0,0,.06);
  --nh:56px; --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--cream); color:var(--ink); min-height:100vh; }

/* NAV */
nav { position:fixed; top:0; left:0; right:0; height:var(--nh); background:var(--brown);
  display:flex; align-items:center; padding:0 14px; gap:3px; z-index:200;
  box-shadow:0 2px 8px rgba(0,0,0,.3); }
.nav-logo { color:var(--gold); font-weight:800; font-size:17px; margin-right:6px; white-space:nowrap; letter-spacing:-.3px; }
nav button { background:none; border:none; color:var(--brown3); padding:7px 10px; border-radius:var(--rs);
  cursor:pointer; font-size:13px; font-weight:600; white-space:nowrap; transition:background .15s,color .15s; }
nav button.active, nav button:hover { background:rgba(252,211,77,.12); color:var(--gold); }
.nsp { flex:1; }
.db-dot { width:8px; height:8px; border-radius:50%; background:var(--brown3); }
.db-dot.ok { background:#4ade80; }

/* PIN LOCK */
.pin-screen { position:fixed; inset:0; background:var(--brown); z-index:9999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; }
.pin-title { color:var(--gold); font-size:22px; font-weight:800; letter-spacing:-.5px; }
.pin-sub { color:var(--brown3); font-size:14px; }
.pin-dots { display:flex; gap:14px; }
.pin-dot { width:16px; height:16px; border-radius:50%; border:2px solid var(--brown3); background:transparent; transition:background .15s; }
.pin-dot.filled { background:var(--honey); border-color:var(--honey); }
.pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; width:220px; }
.pin-key { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); border-radius:12px;
  color:var(--white); font-size:22px; font-weight:700; padding:16px; text-align:center;
  cursor:pointer; transition:background .1s; font-family:var(--font); }
.pin-key:hover { background:rgba(255,255,255,.14); }
.pin-key:active { background:rgba(255,255,255,.2); transform:scale(.96); }
.pin-key.del { font-size:16px; color:var(--brown3); }
.pin-error { color:#f87171; font-size:13px; font-weight:600; min-height:20px; }

/* LAYOUT */
main { padding:calc(var(--nh) + 16px) 12px 100px; max-width:700px; margin:0 auto; }

/* CARDS */
.card { background:var(--white); border-radius:var(--r); box-shadow:var(--sh); padding:18px; margin-bottom:14px; }
.card-hd { font-size:15px; font-weight:700; color:var(--brown); margin-bottom:14px;
  display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.card-hd .sub { font-size:12px; font-weight:500; color:var(--brown3); margin-left:auto; }

/* CHIPS */
.chip { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px;
  font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
.chip-B { background:var(--cB-bg); color:var(--cB); }
.chip-S { background:var(--cS-bg); color:var(--cS); }
.chip-F { background:var(--cF-bg); color:var(--cF); }
.chip-A { background:var(--cA-bg); color:var(--cA); }
.chip-ok   { background:#dcfce7; color:var(--green); }
.chip-warn { background:#fef9c3; color:#854d0e; }
.chip-due  { background:#fff1f2; color:var(--red); }
.chip-std  { background:var(--wax); color:var(--amber); }

/* FORMS */
.field { display:flex; flex-direction:column; gap:5px; }
.field label { font-size:11px; font-weight:700; color:var(--brown2); text-transform:uppercase; letter-spacing:.5px; }
input, select, textarea { padding:10px 12px; border:1.5px solid var(--wax2); border-radius:var(--rs);
  font-size:15px; font-family:var(--font); color:var(--ink); background:var(--cream);
  transition:border-color .15s; outline:none; width:100%; }
input:focus, select:focus, textarea:focus { border-color:var(--amber); background:var(--white); }
textarea { resize:vertical; min-height:60px; }
.r2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.r3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
.mt8  { margin-top:8px; }
.mt12 { margin-top:12px; }
.mt16 { margin-top:16px; }

/* BUTTONS */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:6px;
  padding:11px 18px; border-radius:var(--rs); border:none; font-size:14px; font-weight:700;
  cursor:pointer; transition:opacity .15s, transform .1s; font-family:var(--font); white-space:nowrap; }
.btn:active { transform:scale(.97); }
.btn-p { background:var(--amber); color:var(--white); }
.btn-p:hover { opacity:.88; }
.btn-o { background:transparent; border:1.5px solid var(--wax2); color:var(--brown2); }
.btn-o:hover { border-color:var(--amber); color:var(--amber); }
.btn-g { background:var(--wax); color:var(--brown2); }
.btn-g:hover { background:var(--wax2); }
.btn-d { background:#fef2f2; color:var(--red); border:1.5px solid #fecaca; }
.btn-sm { padding:7px 13px; font-size:12px; }
.btn-xs { padding:5px 10px; font-size:11px; }
.btn-block { width:100%; }
.btn-add { background:var(--wax); color:var(--amber); border:1.5px dashed var(--wax2); }
.btn-add:hover { background:var(--wax2); }
.btn-row { display:flex; gap:8px; flex-wrap:wrap; }

/* TABS */
.tabs { display:flex; border-bottom:2px solid var(--wax2); margin-bottom:16px; }
.tab { padding:9px 14px; font-size:13px; font-weight:700; cursor:pointer; border:none; background:none;
  color:var(--brown3); border-bottom:3px solid transparent; margin-bottom:-2px; transition:color .15s,border-color .15s; }
.tab.active { color:var(--amber); border-bottom-color:var(--amber); }

/* SECTION LABEL */
.sec-lbl { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px;
  color:var(--brown3); margin-bottom:8px; }
.divider { height:1px; background:var(--wax2); margin:14px 0; }
.t-sm { font-size:13px; color:var(--brown2); }
.t-xs { font-size:11px; color:var(--brown3); }
.t-num { font-size:22px; font-weight:800; color:var(--amber); }
.empty { text-align:center; padding:32px 16px; color:var(--brown3); }
.empty .ei { font-size:36px; margin-bottom:8px; }

/* STATS ROW */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:14px; }
.stat { background:var(--white); border-radius:var(--rs); padding:12px 8px; text-align:center; box-shadow:var(--sh); }
.stat .n { font-size:24px; font-weight:800; color:var(--amber); line-height:1; }
.stat .l { font-size:10px; color:var(--brown3); font-weight:600; text-transform:uppercase; margin-top:3px; }

/* GRAFT CARD */
.graft-card { border:1.5px solid var(--wax2); border-radius:var(--rs); overflow:hidden; margin-bottom:10px; }
.graft-hd { padding:13px 14px; background:var(--wax); display:flex; align-items:center; gap:8px;
  cursor:pointer; flex-wrap:wrap; }
.graft-hd:hover { background:var(--wax2); }
.graft-title { font-weight:700; font-size:14px; }
.graft-body { padding:14px; display:none; }
.graft-body.open { display:block; }

/* TIMELINE */
.tl { display:flex; overflow-x:auto; padding:6px 0; scrollbar-width:none; }
.tl::-webkit-scrollbar { display:none; }
.tl-node { display:flex; flex-direction:column; align-items:center; flex:1; min-width:56px; position:relative; }
.tl-node::before { content:''; position:absolute; top:13px; left:50%; right:-50%; height:2px; background:var(--wax2); z-index:0; }
.tl-node:last-child::before { display:none; }
.tl-dot { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:800; z-index:1; border:2px solid var(--wax2); background:var(--white); color:var(--brown3); }
.tl-dot.past { background:var(--amber); border-color:var(--amber); color:var(--white); }
.tl-dot.now  { background:var(--white); border-color:var(--amber); color:var(--amber); box-shadow:0 0 0 3px rgba(217,119,6,.2); }
.tl-lbl  { font-size:9px; font-weight:700; color:var(--brown2); margin-top:3px; text-align:center; }
.tl-date { font-size:9px; color:var(--brown3); text-align:center; }

/* CELL MOVEMENT */
.move-row { background:var(--cream); border:1px solid var(--wax2); border-radius:var(--rs);
  padding:10px 12px; margin-bottom:8px; }
.move-hd { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:6px; }
.move-counts { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:8px; }
.count-box { background:var(--white); border:1.5px solid var(--wax2); border-radius:var(--rs);
  padding:8px; text-align:center; }
.count-box label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.4px;
  color:var(--brown3); display:block; margin-bottom:4px; }
.count-box input { padding:6px; font-size:18px; font-weight:800; text-align:center; border:none;
  background:transparent; width:100%; }
.count-box input:focus { outline:none; }
.count-box .swatch { width:8px; height:8px; border-radius:2px; display:inline-block; margin-right:4px; }

/* FINISHER ROW */
.fin-row { border:1.5px solid var(--wax2); border-radius:var(--rs); padding:12px; margin-bottom:8px; background:var(--white); }
.fin-row-hd { display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap; }
.fin-stat { display:flex; flex-direction:column; align-items:center; background:var(--cream);
  border-radius:var(--rs); padding:8px 12px; min-width:56px; }
.fin-stat .fsn { font-size:20px; font-weight:800; color:var(--ink); }
.fin-stat .fsl { font-size:9px; text-transform:uppercase; letter-spacing:.3px; color:var(--brown3); }

/* HIVE LIST */
.hive-list { display:flex; flex-direction:column; gap:8px; }
.hive-row { display:flex; align-items:center; gap:10px; background:var(--cream); border:1.5px solid var(--wax2);
  border-radius:var(--rs); padding:11px 14px; cursor:pointer; transition:border-color .15s; }
.hive-row:hover { border-color:var(--amber); }
.hive-icon { font-size:18px; width:28px; text-align:center; flex-shrink:0; color:var(--brown2); font-weight:700; }
.hive-info { flex:1; min-width:0; }
.hive-name { font-weight:700; font-size:14px; }
.hive-meta { font-size:11px; color:var(--brown3); margin-top:1px; }
.qs-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; background:var(--brown3); }
.qs-green  { background:#4ade80; }
.qs-amber  { background:var(--honey); }
.qs-purple { background:#c084fc; }

/* PANEL */
.panel { position:fixed; inset:0; z-index:300; display:flex; flex-direction:column;
  background:var(--cream); transform:translateX(100%); transition:transform .25s ease; }
.panel.open { transform:translateX(0); }
.panel-hd { display:flex; align-items:center; gap:12px; padding:14px 16px; background:var(--white);
  border-bottom:1.5px solid var(--wax2); min-height:var(--nh); }
.panel-title { font-weight:800; font-size:16px; flex:1; }
.panel-body { flex:1; overflow-y:auto; padding:16px; padding-bottom:80px; }

/* LOG */
.log-entry { border-left:3px solid var(--wax2); padding:8px 12px; margin-bottom:8px;
  border-radius:0 var(--rs) var(--rs) 0; background:var(--cream); }
.log-entry.t-inspection { border-left-color:var(--blue); }
.log-entry.t-feeding    { border-left-color:var(--green); }
.log-entry.t-queen      { border-left-color:var(--purple); }
.log-date { font-size:10px; color:var(--brown3); font-weight:600; }
.log-note { font-size:13px; color:var(--brown); margin-top:2px; }
.log-check-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:4px; }
.log-check { display:flex; align-items:center; gap:8px; padding:9px 11px;
  background:var(--cream); border:1.5px solid var(--wax2); border-radius:var(--rs);
  cursor:pointer; font-size:13px; font-weight:500; transition:border-color .15s, background .15s; }
.log-check:hover { border-color:var(--amber); }
.log-check input[type=checkbox] { width:16px; height:16px; accent-color:var(--amber);
  cursor:pointer; flex-shrink:0; }
.log-check input[type=checkbox]:checked + span { font-weight:700; color:var(--amber); }
.log-check:has(input:checked) { border-color:var(--amber); background:var(--wax); }
@media (max-width:400px) { .log-check-grid { grid-template-columns:1fr; } }

/* DUE BANNER */
.due-banner { background:linear-gradient(135deg,#fffbeb,#fef3c7); border:1.5px solid var(--honey);
  border-radius:var(--r); padding:14px 16px; margin-bottom:14px; }
.due-banner-hd { font-weight:800; font-size:14px; color:var(--amber); margin-bottom:8px; }
.due-item { display:flex; align-items:center; gap:8px; padding:7px 0;
  border-bottom:1px solid var(--wax2); flex-wrap:wrap; }
.due-item:last-child { border-bottom:none; }
.due-item-info { flex:1; min-width:160px; }
.due-item-info strong { font-size:13px; font-weight:700; display:block; }
.due-item-info span { font-size:11px; color:var(--brown3); }

/* PROTOCOL TOGGLE */
.proto-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:16px; }
.proto-btn { padding:12px 8px; border-radius:var(--rs); border:2px solid var(--wax2); background:var(--cream);
  cursor:pointer; text-align:center; font-weight:700; font-size:13px; color:var(--brown2);
  transition:all .15s; font-family:var(--font); }
.proto-btn .pi { font-size:18px; display:block; margin-bottom:3px; }
.proto-btn .ps { font-size:10px; font-weight:500; color:var(--brown3); display:block; }
.proto-btn.active { border-color:var(--amber); background:var(--wax); color:var(--amber); }

/* SUCCESS % BAR */
.pct-bar-wrap { background:var(--wax2); border-radius:20px; height:8px; overflow:hidden; margin-top:4px; }
.pct-bar { height:100%; border-radius:20px; background:var(--amber); transition:width .4s; }
.pct-bar.good { background:var(--green); }
.pct-bar.ok   { background:var(--honey); }
.pct-bar.low  { background:var(--red); }

/* CALENDAR */
.cal-scroll { overflow-x:auto; }
.cal-tbl { border-collapse:collapse; font-size:11px; min-width:500px; }
.cal-tbl th { background:var(--brown); color:var(--gold); padding:4px 6px; text-align:center; font-size:10px; }
.cal-tbl td { padding:3px 4px; border:1px solid var(--wax2); text-align:center; vertical-align:middle; }
.cal-tbl .row-lbl { text-align:left; font-weight:700; font-size:10px; padding:4px 8px;
  background:var(--wax); white-space:nowrap; position:sticky; left:0; z-index:2; }
.cc-g { background:var(--amber); color:var(--white); border-radius:3px; padding:1px 5px; font-weight:700; font-size:10px; }
.cc-s { background:#bfdbfe; color:#1e40af; border-radius:3px; padding:1px 5px; font-size:10px; }
.cc-c { background:var(--gold); color:var(--brown); border-radius:3px; padding:1px 5px; font-weight:700; font-size:10px; }
.cc-o { background:#bbf7d0; color:#14532d; border-radius:3px; padding:1px 5px; font-weight:700; font-size:10px; }
.cc-m { background:#e9d5ff; color:#6b21a8; border-radius:3px; padding:1px 5px; font-size:10px; }
.cal-today { background:#fffbeb !important; }

/* BOTTOM BAR (mobile) */
.bbar { display:none; position:fixed; bottom:0; left:0; right:0; height:60px;
  background:var(--brown); border-top:1px solid rgba(255,255,255,.08); z-index:200; }
.bbar-inner { display:flex; height:100%; }
.bbt { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:2px; cursor:pointer; border:none; background:none; color:var(--brown3);
  font-size:10px; font-weight:600; transition:color .15s; }
.bbt .bi { font-size:18px; font-style:normal; }
.bbt.active, .bbt:hover { color:var(--gold); }

/* TOAST */
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--brown); color:var(--gold); padding:11px 22px; border-radius:30px;
  font-size:14px; font-weight:700; box-shadow:0 4px 20px rgba(0,0,0,.3);
  transition:transform .3s; z-index:999; white-space:nowrap; pointer-events:none; }
#toast.show { transform:translateX(-50%) translateY(0); }

@media (max-width:640px) {
  nav button:not(.always-show) { display:none; }
  .bbar { display:block; }
  main { padding-bottom:76px; }
  .stats-row { grid-template-columns:repeat(2,1fr); }
  .move-counts { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">QCT</div><div id="save-indicator" style="font-size:10px;color:var(--brown3);opacity:0;transition:opacity .3s"></div>
  <button class="active" onclick="go('dash')">Home</button>
  <button onclick="go('graft')">New Graft</button>
  <button onclick="go('hives')">Hives</button>
  <button onclick="go('stats')">Stats</button>
  <button onclick="go('calendar')">Calendar</button>
  <button onclick="go('settings')">Settings</button>
  <div class="nsp"></div>
  <div class="db-dot" id="db-dot"></div>
</nav>

<main id="app"></main>

<div class="bbar">
  <div class="bbar-inner">
    <button class="bbt active" onclick="go('dash')"><i class="bi">H</i>Home</button>
    <button class="bbt" onclick="go('graft')"><i class="bi">+</i>Graft</button>
    <button class="bbt" onclick="go('hives')"><i class="bi">B</i>Hives</button>
    <button class="bbt" onclick="go('calendar')"><i class="bi">C</i>Cal</button>
    <button class="bbt" onclick="go('stats')"><i class="bi">%</i>Stats</button>
    <button class="bbt" onclick="go('settings')"><i class="bi">S</i>More</button>
  </div>
</div>

<div class="panel" id="hive-panel">
  <div class="panel-hd">
    <button class="btn btn-g btn-sm" onclick="closePanel()">Back</button>
    <div class="panel-title" id="panel-title"></div>
    <button class="btn btn-d btn-xs" onclick="deleteHive()" style="margin-left:auto">Delete</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// DATA MODEL
// ═══════════════════════════════════════════════════════
/*
  hives: [{ id, type:'breeder'|'starter'|'finisher', name, queen_status, strength, notes, log:[] }]

  grafts: [{
    id, date, protocol:'standard'|'autumn',
    breeder_id, starter_id,   // autumn: starter_id = finisher acting as both
    grafted: number,          // cells put in on Day 0
    notes,
    movements: [{             // each time cells move or are counted
      id, date,
      from_hive_id,           // null = initial placement in starter
      to_hive_id,
      cell_count,             // how many cells in this movement
      type: 'place'|'move'|'check',
      stage: 'started'|'capped'|'emerged'|'mated',
      note
    }],
    finisher_records: [{      // per finisher totals, updated at each check
      finisher_id,
      cells_received,         // total cells placed here (sum of movements in)
      capped, emerged, mated, // counts recorded at each check
      check_dates: { capped:date, emerged:date, mated:date }
    }]
  }]
*/

const LOG_TYPES = [
  { value:'inspection',  label:'Inspection' },
  { value:'e-cell',      label:'E-cell check' },
  { value:'ss-cell',     label:'SS cell check' },
  { value:'sugar-syrup', label:'Sugar syrup' },
  { value:'add-brood',   label:'Add brood' },
  { value:'brood-up',    label:'Brood up' },
  { value:'swarm-check', label:'Swarm check' },
  { value:'super-on',    label:'Super on' },
  { value:'rq',          label:'RQ' },
  { value:'queen-event', label:'Queen event' },
];

let DB = { hives:[], grafts:[], supaUrl:'', supaKey:'' };
let page = 'dash', hvTab = 'all', panelId = null, graftForm = null, bulkLogState = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return dayjs().format('YYYY-MM-DD'); }
function fmt(d)  { return d ? dayjs(d).format('D MMM') : '—'; }
function fmtF(d) { return d ? dayjs(d).format('D MMM YY') : '—'; }
function isPast(d)  { return d < today(); }
function isToday(d) { return d === today(); }
function hById(id)    { return DB.hives.find(h=>h.id===id); }
function hByType(t)   { return DB.hives.filter(h=>h.type===t); }
function numFromName(name) {
  const m = name.match(/\d+/);
  return m ? parseInt(m[0]) : 999;
}

function sortedFinishers(excludeGraftId, currentRowIndex=-1) {
  const sorted = hByType('finisher').slice().sort((a,b) => {
    const numA = numFromName(a.name), numB = numFromName(b.name);
    if (numA !== numB) return numA - numB;
    return a.name.localeCompare(b.name);
  });
  return sorted.sort((a,b) => {
    const sA = finisherStatus(a.id, excludeGraftId, currentRowIndex);
    const sB = finisherStatus(b.id, excludeGraftId, currentRowIndex);
    const unavailA = !sA.available ? 1 : 0;
    const unavailB = !sB.available ? 1 : 0;
    if (unavailA !== unavailB) return unavailA - unavailB;
    return numFromName(a.name) - numFromName(b.name);
  });
}

function finisherStatus(finisherId, excludeGraftId, currentRowIndex=-1) {
  // Find all active graft batches that have this finisher
  // Returns { available: bool, label: string, priority: number (lower = more available) }
  // excludeGraftId: ignore this graft when checking (used when adding more cells to same graft)
  const td = today();
  let worstStatus = null; // track the most restrictive active batch

  // Check if already assigned in another row in the current day1Rows session
  const inOtherRow = day1Rows.some((r, idx) =>
    r.finisher_id === finisherId && idx !== currentRowIndex
  );
  if (inOtherRow) {
    return { available: false, label: 'Already assigned', priority: -1 };
  }

  DB.grafts.forEach(g => {
    if (excludeGraftId && g.id === excludeGraftId) return; // same graft — always OK
    const fr = (g.finisher_records||[]).find(r => r.finisher_id === finisherId);
    if (!fr) return;

    const d = dayjs(g.date);
    const cappedDate  = fr.check_dates?.capped  || d.add(5,'day').format('YYYY-MM-DD');
    const outDate     = fr.check_dates?.emerged  || d.add(10,'day').format('YYYY-MM-DD');

    // Ignore batches that are fully out
    if (outDate < td) return;

    const daysToCaped  = dayjs(cappedDate).diff(dayjs(td), 'day');
    const daysToCapped = daysToCaped; // cells still growing
    const daysSinceCapped = dayjs(td).diff(dayjs(cappedDate), 'day');

    if (cappedDate > td) {
      // Still growing — unavailable
      const status = { available: false, label: `Growing — capped in ${daysToCapped}d`, priority: 0 };
      if (!worstStatus || status.priority < worstStatus.priority) worstStatus = status;
    } else {
      // Capped or past capped
      const status = daysSinceCapped === 0
        ? { available: true, label: 'Capped today', priority: 2 }
        : daysSinceCapped === 1
        ? { available: true, label: 'Capped yesterday', priority: 2 }
        : { available: true, label: `Capped ${daysSinceCapped}d ago`, priority: 3 };
      if (!worstStatus || status.priority < worstStatus.priority) worstStatus = status;
    }
  });

  if (!worstStatus) return { available: true, label: 'Available', priority: 4 };
  return worstStatus;
}

function finisherOptionLabel(h, excludeGraftId, currentRowIndex=-1) {
  const s = finisherStatus(h.id, excludeGraftId, currentRowIndex);
  const icon = s.available ? (s.label === 'Available' ? '' : '+ ') : '— ';
  return `${h.name}  —  ${icon}${s.label}`;
}

function finisherOptionStyle(h, excludeGraftId, currentRowIndex=-1) {
  const s = finisherStatus(h.id, excludeGraftId, currentRowIndex);
  if (!s.available && s.priority === -1) return 'color:#9ca3af'; // grey — already assigned in another row
  if (!s.available) return 'color:#dc2626';                       // red — growing (other graft)
  if (s.label === 'Available') return 'color:#15803d';            // green — empty
  return 'color:#d97706';                                         // amber — capped, safe to add
}
function gById(id)    { return DB.grafts.find(g=>g.id===id); }

function pct(num, denom) {
  if (!denom) return null;
  return Math.round(num / denom * 100);
}
function pctBar(p) {
  if (p === null) return '';
  const cls = p >= 70 ? 'good' : p >= 40 ? 'ok' : 'low';
  return `<div style="display:flex;align-items:center;gap:6px;margin-top:4px">
    <div class="pct-bar-wrap" style="flex:1"><div class="pct-bar ${cls}" style="width:${p}%"></div></div>
    <span style="font-size:11px;font-weight:700;color:var(--brown2);min-width:32px">${p}%</span>
  </div>`;
}

function saveLocal() {
  try {
    const data = JSON.stringify({hives:DB.hives, grafts:DB.grafts});
    localStorage.setItem('qct2', data);
    // Verify it actually wrote
    const check = localStorage.getItem('qct2');
    if (!check) throw new Error('Write appeared to succeed but read back empty');
    const ind = document.getElementById('save-indicator');
    if (ind) { ind.textContent = 'Saved'; ind.style.opacity='1'; setTimeout(()=>ind.style.opacity='0', 1200); }
  } catch(e) {
    console.error('localStorage save failed:', e);
    toast('Storage error: ' + e.message);
  }
}

function testStorage() {
  const result = document.getElementById('storage-test-result');
  if (!result) return;
  try {
    // Test write
    localStorage.setItem('qct_test', 'hello');
    const val = localStorage.getItem('qct_test');
    localStorage.removeItem('qct_test');
    if (val === 'hello') {
      // Check if existing data is there
      const existing = localStorage.getItem('qct2');
      const parsed = existing ? JSON.parse(existing) : null;
      const hiveCount  = parsed?.hives?.length  || 0;
      const graftCount = parsed?.grafts?.length || 0;
      result.style.color = 'var(--green)';
      result.textContent = 'Storage is working. ' + hiveCount + ' hive(s) and ' + graftCount + ' graft(s) saved locally.';
    } else {
      result.style.color = 'var(--red)';
      result.textContent = 'Storage test failed — value did not persist.';
    }
  } catch(e) {
    result.style.color = 'var(--red)';
    result.textContent = 'Storage blocked: ' + e.message + '. This is a browser setting issue.';
  }
}
function save() {
  saveLocal();
  if (DB.supaUrl && DB.supaKey) pushToSupa();
}
function load() {
  const r = localStorage.getItem('qct2');
  if (r) { const d = JSON.parse(r); DB.hives = d.hives||[]; DB.grafts = d.grafts||[]; }
  const c = localStorage.getItem('qct_cfg');
  if (c) { const x = JSON.parse(c); DB.supaUrl = x.url||''; DB.supaKey = x.key||''; }
}

// ═══════════════════════════════════════════════════════
// HELPERS: graft computations
// ═══════════════════════════════════════════════════════
/*
  NEW DATA MODEL:
  graft: {
    id, date, protocol, breeder_id,
    grafted: total cells grafted,
    starter_allocations: [{
      starter_id,
      cells_in: number grafted into this starter,
      cells_out: total cells this starter sent to finishers (sum of distributions)
    }],
    finisher_records: [{
      finisher_id,
      cells_received: total cells in (from all starters),
      sources: [{ starter_id, count }],  // which starter sent how many
      capped, emerged, mated,
      check_dates: {}
    }],
    movements: [...],
    notes
  }
*/

function totalEmerged(g) {
  return (g.finisher_records||[]).reduce((a,r) => a + (r.emerged||0), 0);
}
function totalGrafted(g) {
  // Use sum of starter allocations as the true grafted count
  const fromStarters = (g.starter_allocations||[]).reduce((a,sa) => a + (sa.cells_in||0), 0);
  return fromStarters || (g.grafted||0);
}
function totalMated(g) {
  return (g.finisher_records||[]).reduce((a,r) => a + (r.mated||0), 0);
}
function totalCellsInFinishers(g) {
  return (g.finisher_records||[]).reduce((a,r) => a + (r.cells_received||0), 0);
}
function starterCellsOut(g, starter_id) {
  // Sum of cells this starter sent to all finishers
  return (g.finisher_records||[]).reduce((a,r) => {
    const src = (r.sources||[]).find(s => s.starter_id === starter_id);
    return a + (src ? src.count : 0);
  }, 0);
}
function starterCellsRemaining(g, starter_id) {
  const inn = starterCellsIn(g, starter_id);
  const out = starterCellsOut(g, starter_id);
  return Math.max(0, inn - out);
}
function starterCellsIn(g, starter_id) {
  const sa = (g.starter_allocations||[]).find(s => s.starter_id === starter_id);
  return sa ? (sa.cells_in||0) : 0;
}

function pct(num, denom) {
  if (!denom || denom === 0) return null;
  return Math.round(num / denom * 100);
}
function pctBar(p) {
  if (p === null) return '';
  const cls = p >= 70 ? 'good' : p >= 40 ? 'ok' : 'low';
  return `<div style="display:flex;align-items:center;gap:6px;margin-top:4px">
    <div class="pct-bar-wrap" style="flex:1"><div class="pct-bar ${cls}" style="width:${p}%"></div></div>
    <span style="font-size:11px;font-weight:700;color:var(--brown2);min-width:32px">${p}%</span>
  </div>`;
}

function stagesFor(g) {
  const d = dayjs(g.date);
  if (g.protocol === 'autumn') {
    return [
      { key:'place',   label:'Grafted',  day:0,  date:g.date },
      { key:'emerged', label:'Out',      day:2,  date:d.add(2,'day').format('YYYY-MM-DD') },
    ];
  }
  return [
    { key:'place',   label:'Grafted',       day:0,  date:g.date },
    { key:'started', label:'Into finisher', day:1,  date:d.add(1,'day').format('YYYY-MM-DD') },
    { key:'capped',  label:'Capped',        day:5,  date:d.add(5,'day').format('YYYY-MM-DD') },
    { key:'emerged', label:'Out',           day:10, date:d.add(10,'day').format('YYYY-MM-DD') },
    { key:'mated',   label:'Mated',         day:30, date:d.add(30,'day').format('YYYY-MM-DD') },
  ];
}

function nextDue(g) {
  const stages = stagesFor(g);
  for (const st of stages) {
    if (st.key === 'place') continue;
    let done;
    if (st.key === 'started') {
      // 'started' stage = finishers have been assigned
      done = (g.finisher_records||[]).length > 0;
    } else {
      done = (g.finisher_records||[]).some(r => r[st.key] != null && r[st.key] !== '');
    }
    if (!done) return st;
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
function rDash() {
  const G = DB.grafts;
  const tGraftedSeason = G.reduce((a,g) => a + totalGrafted(g), 0);
  const totalEm = G.reduce((a,g) => a + totalEmerged(g), 0);
  const totalMt = G.reduce((a,g) => a + totalMated(g), 0);
  const seasonPct = pct(totalEm, tGraftedSeason);

  const due = [];
  G.forEach(g => {
    const nd = nextDue(g);
    if (nd) {
      const diff = dayjs(nd.date).diff(dayjs(), 'day');
      if (diff <= 3 && diff >= -2) due.push({g, nd, diff});
    }
  });

  const dueBanner = due.length ? `
    <div class="due-banner">
      <div class="due-banner-hd">Action needed</div>
      ${due.map(({g,nd,diff}) => {
        const B = hById(g.breeder_id);
        const starters = (g.starter_allocations||[]).map(sa => hById(sa.starter_id)?.name||'?').join(', ');
        const cls = diff < 0 ? 'chip-due' : diff === 0 ? 'chip-A' : 'chip-warn';
        const lbl = diff < 0 ? `${Math.abs(diff)}d overdue` : diff === 0 ? 'Today' : `In ${diff}d`;
        return `<div class="due-item">
          <div class="due-item-info">
            <strong>${fmtF(g.date)} — ${B?B.name:'?'}</strong>
            <span>${nd.label} · ${fmt(nd.date)}</span>
          </div>
          <span class="chip ${cls}">${lbl}</span>
          <button class="btn btn-p btn-xs" onclick="openGraft('${g.id}')">Record</button>
        </div>`;
      }).join('')}
    </div>` : '';

  const gList = G.length
    ? G.slice().sort((a,b)=>b.date.localeCompare(a.date)).map(rGraftCard).join('')
    : `<div class="empty"><div class="ei">-</div><p>No grafts yet.<br>Tap <strong>New Graft</strong> to start.</p></div>`;

  const bC = hByType('breeder').length, sC = hByType('starter').length, fC = hByType('finisher').length;

  return `
    ${dueBanner}
    ${(()=>{
      // Cells on the go = cells in active finishers that haven't emerged yet
      const cellsOnTheGo = G.reduce((a,g) => {
        const outDate = g.protocol==='autumn'
          ? dayjs(g.date).add(2,'day').format('YYYY-MM-DD')
          : dayjs(g.date).add(10,'day').format('YYYY-MM-DD');
        if (outDate < today()) return a; // completed
        return a + (g.finisher_records||[]).reduce((b,fr) => {
          const emerged = fr.emerged||0;
          return b + Math.max(0,(fr.cells_received||0) - emerged);
        }, 0);
      }, 0);
      return `<div class="stats-row">
        <div class="stat"><div class="n">${G.length}</div><div class="l">Grafts</div></div>
        <div class="stat"><div class="n">${cellsOnTheGo}</div><div class="l">Cells on the go</div></div>
        <div class="stat"><div class="n">${totalEm}</div><div class="l">Emerged</div></div>
        <div class="stat"><div class="n">${seasonPct !== null ? seasonPct+'%' : '—'}</div><div class="l">Season %</div></div>
      </div>`;
    })()}
    <div class="card">
      <div class="card-hd">Apiary <span class="t-xs">${bC}B · ${sC}S · ${fC}F</span>
        <span class="sub"><button class="btn btn-xs btn-o" onclick="go('hives')">Manage</button></span>
      </div>
      ${rApiarySummary()}
    </div>
    <div class="card">
      <div class="card-hd">Graft Batches
        <span class="sub"><button class="btn btn-xs btn-p" onclick="go('graft')">+ New graft</button></span>
      </div>
      ${gList}
    </div>`;
}

function rApiarySummary() {
  if (!DB.hives.length) return `<p class="t-sm">No hives set up. <a href="#" onclick="go('hives')" style="color:var(--amber)">Add hives first</a></p>`;
  const rows = [];
  ['breeder','starter','finisher'].forEach(type => {
    const hs = hByType(type); if (!hs.length) return;
    const lbl = type==='breeder'?'Breeders':type==='starter'?'Starters':'Finishers';
    const cc  = type==='breeder'?'chip-B':type==='starter'?'chip-S':'chip-F';
    const expandId = 'apiary-expand-'+type;
    rows.push(`
      <div style="border:1px solid var(--wax2);border-radius:var(--rs);margin-bottom:6px;overflow:hidden">
        <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;background:var(--cream)"
          onclick="document.getElementById('${expandId}').style.display=document.getElementById('${expandId}').style.display==='none'?'flex':'none';this.querySelector('.apiary-chevron').textContent=document.getElementById('${expandId}').style.display==='none'?'›':'⌄'">
          <span class="chip ${cc}">${lbl}</span>
          <span style="font-size:13px;font-weight:600;color:var(--brown2)">${hs.length} hive${hs.length!==1?'s':''}</span>
          <span class="apiary-chevron" style="margin-left:auto;color:var(--brown3);font-size:16px">›</span>
        </div>
        <div id="${expandId}" style="display:none;flex-wrap:wrap;gap:6px;padding:8px 12px;background:var(--white);border-top:1px solid var(--wax2)">
          ${hs.map(h => {
            const dc = h.queen_status==='queenright'?'qs-green':h.queen_status==='queenless'?'qs-amber':h.queen_status==='virgin'?'qs-purple':'';
            return `<button class="btn btn-xs btn-g" onclick="openPanel('${h.id}')" style="display:flex;align-items:center;gap:4px">
              <span class="qs-dot ${dc}"></span>${h.name}</button>`;
          }).join('')}
        </div>
      </div>`);
  });
  return rows.join('');
}

// ═══════════════════════════════════════════════════════
// GRAFT CARD — journey style
// ═══════════════════════════════════════════════════════
function rGraftCard(g) {
  const B = hById(g.breeder_id);
  const frecs = g.finisher_records || [];
  const sAllocs = g.starter_allocations || [];
  const isA = g.protocol === 'autumn';

  const tEm  = totalEmerged(g);
  const tGr  = totalGrafted(g);
  const gPct = pct(tEm, tGr);  // tGr already uses totalGrafted

  // Timeline dots
  const stages = stagesFor(g).slice(1);
  const stageDots = stages.map(st => {
    const done = frecs.some(r => r[st.key] != null);
    const cls  = isPast(st.date) && done ? 'past' : isToday(st.date) ? 'now' : '';
    return `<div class="tl-node">
      <div class="tl-dot ${cls}">${done?'v':'o'}</div>
      <div class="tl-lbl">${st.label}</div>
      <div class="tl-date">${fmt(st.date)}</div>
    </div>`;
  }).join('');

  // Starter boxes
  const starterBoxes = sAllocs.map(sa => {
    const S = hById(sa.starter_id);
    const sent = starterCellsOut(g, sa.starter_id);
    const sp = pct(sent, sa.cells_in||0);
    return `<div style="background:var(--cS-bg);border:1px solid var(--cS);border-radius:var(--rs);padding:6px 10px;text-align:center;min-width:64px">
      <div style="font-size:11px;font-weight:700;color:var(--cS)">${S?S.name:'?'}</div>
      <div style="font-size:10px;color:var(--brown3)">${sa.cells_in||0} in</div>
      ${sent>0?`<div style="font-size:10px;color:var(--cF);font-weight:700">${sent} sent</div>`:''}
      ${sp!==null?`<div style="font-size:10px;font-weight:700;color:${sp>=70?'var(--green)':sp>=40?'var(--amber)':'var(--red)'}">${sp}%</div>`:''}
    </div>`;
  }).join('');

  // Finisher boxes
  const finBoxes = frecs.map(fr => {
    const F = hById(fr.finisher_id);
    const fp = pct(fr.emerged||0, fr.cells_received||0);
    const fpCol = fp===null?'var(--brown3)':fp>=70?'var(--green)':fp>=40?'var(--amber)':'var(--red)';
    // Show sources breakdown
    const srcBreakdown = (fr.sources||[]).map(s => {
      const S = hById(s.starter_id);
      return `<span style="font-size:9px;color:var(--brown3)">${S?S.name:'?'}:${s.count}</span>`;
    }).join(' + ');
    return `<div style="background:var(--cF-bg);border:1px solid var(--cF);border-radius:var(--rs);padding:6px 8px;text-align:center;min-width:64px">
      <div style="font-size:11px;font-weight:700;color:var(--cF)">${F?F.name:'?'}</div>
      ${srcBreakdown?`<div style="margin-top:1px">${srcBreakdown}</div>`:''}
      <div style="font-size:10px;color:var(--brown3);margin-top:1px">${fr.cells_received||0} in</div>
      ${fr.capped!=null?`<div style="font-size:10px;color:var(--amber)">${fr.capped} capped</div>`:''}
      <div style="font-size:13px;font-weight:800;color:${fpCol};margin-top:2px">${fr.emerged!=null?fr.emerged:'—'}</div>
      <div style="font-size:9px;color:var(--brown3)">emerged</div>
      ${fp!==null?`<div style="font-size:10px;font-weight:700;color:${fpCol}">${fp}%</div>`:''}
    </div>`;
  }).join('');

  return `<div class="graft-card">
    ${(()=>{
      const outDate = isA ? dayjs(g.date).add(2,'day') : dayjs(g.date).add(10,'day');
      const outDateStr = outDate.format('YYYY-MM-DD');
      const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const outDay = dayNames[outDate.day()];
      const outIsWknd = outDate.day()===0||outDate.day()===6;
      const isCompleted = outDateStr < today();
      // Cells due out = cells in finishers that haven't emerged yet for this graft
      const cellsDueOut = (g.finisher_records||[]).reduce((a,fr) =>
        a + Math.max(0,(fr.cells_received||0)-(fr.emerged||0)), 0);
      const tIn = totalCellsInFinishers(g);
      return `<div class="graft-hd" onclick="toggleGraft('${g.id}')">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span class="graft-title">${fmtF(g.date)}</span>
            <span class="chip ${isA?'chip-A':'chip-std'}" style="font-size:10px">${isA?'Autumn':'Standard'}</span>
            <span class="chip chip-B" style="font-size:10px">${B?B.name:'?'}</span>
          </div>
          <div style="margin-top:4px;font-size:12px;color:var(--brown2)">
            Out: <strong style="color:${outIsWknd?'var(--red)':isCompleted?'var(--brown3)':'var(--amber)'}">${outDay} ${fmt(outDateStr)}</strong>
            ${outIsWknd&&!isCompleted?`<span style="color:var(--red);font-size:10px;font-weight:700"> Weekend</span>`:''}
            ${isCompleted?`<span style="color:var(--brown3);font-size:10px"> · Done</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          ${!isCompleted&&tIn>0?`<div style="font-size:20px;font-weight:800;color:var(--amber);line-height:1">${cellsDueOut}</div>
            <div style="font-size:9px;color:var(--brown3);text-transform:uppercase;letter-spacing:.3px">cells out</div>`:''}
          ${gPct!==null?`<div class="chip ${gPct>=70?'chip-ok':gPct>=40?'chip-warn':'chip-due'}" style="margin-top:2px">${gPct}%</div>`:''}
        </div>
        <span style="color:var(--brown3);font-size:16px;margin-left:6px">›</span>
      </div>`;
    })()}
    <div class="graft-body" id="gb-${g.id}">
      <div class="tl" style="margin-bottom:10px">${stageDots}</div>

      <!-- Journey flow -->
      <div style="display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap;margin-bottom:10px">
        <!-- Breeder -->
        <div style="background:var(--cB-bg);border:1px solid var(--cB);border-radius:var(--rs);padding:6px 10px;text-align:center">
          <div style="font-size:11px;font-weight:700;color:var(--cB)">${B?B.name:'?'}</div>
          <div style="font-size:10px;color:var(--brown3)">${tGr} grafted</div>
        </div>
        ${sAllocs.length?`<div style="color:var(--brown3);font-size:18px;padding-top:8px">→</div>`:''}
        <!-- Starters -->
        <div style="display:flex;gap:6px;flex-wrap:wrap">${starterBoxes}</div>
        ${frecs.length?`<div style="color:var(--brown3);font-size:18px;padding-top:8px">→</div>`:''}
        <!-- Finishers -->
        <div style="display:flex;gap:6px;flex-wrap:wrap">${finBoxes}</div>
      </div>

      ${gPct!==null?`<div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span class="t-xs">Emerged / grafted</span>
          <span class="t-xs" style="font-weight:700">${tEm} / ${tGr}</span>
        </div>${pctBar(gPct)}</div>`:''}

      <div class="divider"></div>
      <div class="btn-row">
        <button class="btn btn-p btn-sm" onclick="openRecordPanel('${g.id}')">Record / update</button>
        <button class="btn btn-o btn-sm" onclick="editGraft('${g.id}')">Edit</button>
        <button class="btn btn-d btn-sm" onclick="deleteGraft('${g.id}')">Delete</button>
      </div>
      ${g.notes?`<p class="t-xs mt8">${g.notes}</p>`:''}
    </div>
  </div>`;
}

function toggleGraft(id) {
  const el = document.getElementById('gb-'+id);
  if (el) el.classList.toggle('open');
}

// ═══════════════════════════════════════════════════════
// NEW GRAFT FORM — Day 0: breeder + starters + cells grafted
// ═══════════════════════════════════════════════════════
function initGraftForm() {
  graftForm = {
    id: null, date: today(), protocol: 'standard',
    breeder_id: hByType('breeder')[0]?.id || '',
    grafted: 45,
    starter_allocations: [], // [{ starter_id, cells_in }]
    notes: ''
  };
}

function rGraftForm() {
  if (!graftForm) initGraftForm();
  const f = graftForm;
  const breeders  = hByType('breeder');
  const starters  = hByType('starter');
  const finishers = hByType('finisher');
  const isA = f.protocol === 'autumn';

  if (!breeders.length || !finishers.length) {
    return `<div class="card">
      <div class="card-hd">Set up hives first</div>
      <p class="t-sm">You need at least one breeder and one finisher hive.</p>
      <div class="mt12"><button class="btn btn-p" onclick="go('hives')">Set up hives</button></div>
    </div>`;
  }

  const d = dayjs(f.date);
  const stages = isA
    ? [{l:'Graft',d:f.date},{l:'Out Day 2',d:d.add(2,'day').format('YYYY-MM-DD')}]
    : [{l:'Graft',d:f.date},{l:'Into finisher',d:d.add(1,'day').format('YYYY-MM-DD')},
       {l:'Capped',d:d.add(5,'day').format('YYYY-MM-DD')},
       {l:'Out',d:d.add(10,'day').format('YYYY-MM-DD')},
       {l:'Mated',d:d.add(30,'day').format('YYYY-MM-DD')}];

  const tl = stages.map(s => {
    const cls = isPast(s.d)?'past':isToday(s.d)?'now':'';
    return `<div class="tl-node">
      <div class="tl-dot ${cls}">${isPast(s.d)?'v':'o'}</div>
      <div class="tl-lbl">${s.l}</div>
      <div class="tl-date">${fmt(s.d)}</div>
    </div>`;
  }).join('');

  // Starter allocation rows
  const saRows = (f.starter_allocations||[]).map((sa, i) => `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <select style="flex:1;padding:8px;font-size:14px;border:1.5px solid var(--wax2);border-radius:var(--rs);background:var(--cream)"
        onchange="graftForm.starter_allocations[${i}].starter_id=this.value">
        <option value="">Select starter...</option>
        ${starters.map(s=>`<option value="${s.id}" ${sa.starter_id===s.id?'selected':''}>${s.name}</option>`).join('')}
      </select>
      <input type="number" min="0" placeholder="Cells" value="${sa.cells_in||''}"
        style="width:80px;padding:10px;text-align:center;font-size:16px;font-weight:700;border:1.5px solid var(--wax2);border-radius:var(--rs);background:var(--cream)"
        oninput="graftForm.starter_allocations[${i}].cells_in=+this.value;graftForm.grafted=graftForm.starter_allocations.reduce((a,s)=>a+(s.cells_in||0),0);const tot=document.getElementById('sa-total');if(tot)tot.textContent=graftForm.grafted;">
      <button class="btn btn-d btn-xs" onclick="removeSA(${i})">×</button>
    </div>`).join('');

  // For autumn — finisher acts as starter
  const autumnRow = isA ? `
    <div class="field mt12">
      <label>Finisher hive (acts as starter + finisher)</label>
      <select onchange="graftForm.autumn_finisher_id=this.value">
        <option value="">Select...</option>
        ${sortedFinishers().map(h=>`<option value="${h.id}" ${f.autumn_finisher_id===h.id?'selected':''} style="${finisherOptionStyle(h)}">${finisherOptionLabel(h)}</option>`).join('')}
      </select>
    </div>` : '';

  return `<div class="card">
    <div class="card-hd">${f.id ? 'Edit Graft' : 'New Graft — Day 0'}
      ${f.id?`<button class="btn btn-g btn-xs" onclick="cancelGraft()">Cancel</button>`:''}
    </div>

    <div class="proto-row">
      <button class="proto-btn ${!isA?'active':''}" onclick="graftForm.protocol='standard';renderG()">
        <span class="pi">Standard</span><span class="ps">10 days — starter then finisher</span>
      </button>
      <button class="proto-btn ${isA?'active':''}" onclick="graftForm.protocol='autumn';renderG()">
        <span class="pi">Autumn</span><span class="ps">2 days — straight into finisher</span>
      </button>
    </div>

    <div class="tl" style="margin-bottom:16px">${tl}</div>

    <div class="r2">
      <div class="field">
        <label>Graft Date</label>
        <input type="date" value="${f.date}" oninput="graftForm.date=this.value;renderG()">
      </div>
      <div class="field">
        <label>Cells Grafted</label>
        ${(f.starter_allocations||[]).length > 0
          ? `<div style="padding:10px 12px;border:1.5px solid var(--wax2);border-radius:var(--rs);background:var(--wax);font-size:20px;font-weight:800;color:var(--amber);text-align:center" id="sa-total">${f.starter_allocations.reduce((a,s)=>a+(s.cells_in||0),0)}</div>`
          : `<input type="number" min="0" placeholder="e.g. 45" value="${f.grafted||''}"
              oninput="graftForm.grafted=+this.value">`
        }
      </div>
    </div>
    <p class="t-xs mt8" style="color:var(--brown3)">Cells grafted auto-totals from starters once you add them below.</p>

    ${(()=>{
      const gd = dayjs(f.date);
      const outDate = isA ? gd.add(2,'day') : gd.add(10,'day');
      const cappedDate = isA ? null : gd.add(5,'day');
      const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const outDay = dayNames[outDate.day()];
      const isWeekend = outDate.day()===0||outDate.day()===6;
      const cappedDay = cappedDate ? dayNames[cappedDate.day()] : null;
      return `<div style="background:var(--wax);border-radius:var(--rs);padding:12px 14px;margin-top:12px">
        ${!isA?`<div style="margin-bottom:6px;font-size:13px;color:var(--brown2)">
          Capped: <strong>${cappedDay} ${cappedDate.format('D MMM')}</strong>
        </div>`:''}
        <div style="font-size:15px;color:var(--brown)">
          Cells out: <strong style="font-size:18px;color:${isWeekend?'var(--red)':'var(--amber)'}">${outDay} ${outDate.format('D MMM')}</strong>
          ${isWeekend?`<span style="font-size:11px;color:var(--red);margin-left:6px;font-weight:700">Weekend</span>`:''}
        </div>
      </div>`;
    })()}

    <div class="field mt12">
      <label>Breeder</label>
      <select onchange="graftForm.breeder_id=this.value">
        <option value="">Select breeder...</option>
        ${breeders.map(h=>`<option value="${h.id}" ${f.breeder_id===h.id?'selected':''}>${h.name}</option>`).join('')}
      </select>
    </div>

    ${!isA ? `
    <div class="mt12">
      <div class="sec-lbl">Starters — how many cells into each</div>
      <div id="sa-rows">${saRows}</div>
      <button class="btn btn-add btn-sm" onclick="addSA()" style="width:100%">+ Add starter</button>
    </div>` : autumnRow}

    <div class="field mt12">
      <label>Notes</label>
      <textarea oninput="graftForm.notes=this.value" placeholder="Weather, frame notes...">${f.notes||''}</textarea>
    </div>

    <div class="btn-row mt12">
      <button class="btn btn-p" onclick="saveGraft()">Save — assign finishers tomorrow</button>
      <button class="btn btn-g" onclick="cancelGraft()">Cancel</button>
    </div>
  </div>`;
}

function renderG() { document.getElementById('app').innerHTML = rGraftForm(); }
function addSA() {
  if (!graftForm.starter_allocations) graftForm.starter_allocations = [];
  graftForm.starter_allocations.push({ starter_id:'', cells_in:0 });
  renderG();
}
function removeSA(i) {
  graftForm.starter_allocations.splice(i,1);
  renderG();
}

function saveGraft() {
  const f = graftForm;
  if (!f.breeder_id) { toast('Select a breeder'); return; }
  if (f.protocol !== 'autumn' && (!f.starter_allocations||!f.starter_allocations.length)) {
    toast('Add at least one starter'); return;
  }
  if (f.protocol !== 'autumn' && f.starter_allocations.some(sa=>!sa.starter_id)) {
    toast('Select a starter for each row'); return;
  }
  const existing = f.id ? gById(f.id) : null;
  const g = {
    id: f.id || uid(),
    date: f.date, protocol: f.protocol,
    breeder_id: f.breeder_id,
    grafted: f.grafted||0,
    starter_allocations: f.protocol==='autumn'
      ? [{ starter_id: f.autumn_finisher_id||'', cells_in: f.grafted||0 }]
      : (f.starter_allocations||[]).map(sa=>({...sa})),
    notes: f.notes,
    movements:        existing?.movements        || [],
    finisher_records: existing?.finisher_records || []
  };
  // Autumn: auto-create finisher record
  if (f.protocol==='autumn' && f.autumn_finisher_id && !g.finisher_records.length) {
    g.finisher_records.push({
      finisher_id: f.autumn_finisher_id, cells_received: f.grafted||0,
      sources: [{ starter_id: f.autumn_finisher_id, count: f.grafted||0 }],
      capped:null, emerged:null, mated:null, check_dates:{}
    });
  }
  const idx = DB.grafts.findIndex(x=>x.id===g.id);
  if (idx>=0) DB.grafts[idx]=g; else DB.grafts.unshift(g);
  save(); graftForm=null; toast('Graft saved'); go('dash');
}

function editGraft(id) {
  const g = gById(id); if (!g) return;
  graftForm = {
    id: g.id, date: g.date, protocol: g.protocol,
    breeder_id: g.breeder_id, grafted: g.grafted, notes: g.notes,
    starter_allocations: (g.starter_allocations||[]).map(sa=>({...sa})),
    autumn_finisher_id: g.protocol==='autumn' ? (g.starter_allocations||[])[0]?.starter_id : ''
  };
  go('graft');
}

function cancelGraft() { graftForm=null; go('dash'); }
function deleteGraft(id) {
  if (!confirm('Delete this graft batch?')) return;
  DB.grafts = DB.grafts.filter(g=>g.id!==id);
  saveLocal(); deleteFromSupa('qct_grafts', id);
  toast('Deleted'); render();
}
function openGraft(id) { openRecordPanel(id); }

// ═══════════════════════════════════════════════════════
// RECORD PANEL — Day 1+: assign cells from starters to finishers
// ═══════════════════════════════════════════════════════
function openRecordPanel(id) {
  panelGraftId = id;
  day1Data = {};
  const g = gById(id); if (!g) return;
  const B = hById(g.breeder_id);
  const finishers = hByType('finisher');
  const frecs = g.finisher_records||[];
  const sAllocs = g.starter_allocations||[];
  const isA = g.protocol==='autumn';
  const tEm = totalEmerged(g), tMt = totalMated(g);
  const tIn  = totalCellsInFinishers(g);
  const _tGr = totalGrafted(g);
  const gPct = pct(tEm, _tGr), layPct = pct(tMt, _tGr);

  document.getElementById('panel-title').innerHTML =
    `${fmtF(g.date)} — ${B?B.name:'?'}`;
  document.querySelector('.panel .btn-d').style.display = 'none';

  // Starter summary
  const starterSummary = sAllocs.map(sa => {
    const S = hById(sa.starter_id);
    const sent = starterCellsOut(g, sa.starter_id);
    const sp = pct(sent, sa.cells_in||0);
    const spCol = sp===null?'var(--brown3)':sp>=70?'var(--green)':sp>=40?'var(--amber)':'var(--red)';
    return `<div style="background:var(--cS-bg);border:1px solid var(--cS);border-radius:var(--rs);padding:8px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px">
      <span class="chip chip-S">${S?S.name:'?'}</span>
      <span class="t-xs">${sa.cells_in||0} in</span>
      <span class="t-xs">${sent} sent to finishers</span>
      ${sp!==null?`<span class="chip ${sp>=70?'chip-ok':sp>=40?'chip-warn':'chip-due'}" style="margin-left:auto">${sp}%</span>`:''}
    </div>`;
  }).join('');

  // Day 1 section: shown when no finisher records yet
  // Build starter-centric day1 UI
  const day1Section = (!isA && frecs.length===0) ? (
    sAllocs.length > 0
      ? buildDay1Section(id, sAllocs)
      : `<div class="card" style="border:2px solid var(--amber)">
          <div class="card-hd" style="color:var(--amber)">Day 1 — Assign cells to finishers</div>
          <p class="t-sm">No starters found on this graft. <button class="btn btn-o btn-sm" onclick="closePanel();editGraft('${id}')">Edit graft to add starters</button></p>
         </div>`
  ) : '';

  // Finisher records
  const finRecRows = frecs.map((fr,i) => {
    const F = hById(fr.finisher_id);
    const fp = pct(fr.emerged||0, fr.cells_received||0);
    const fpCol = fp===null?'var(--brown3)':fp>=70?'var(--green)':fp>=40?'var(--amber)':'var(--red)';
    const srcBreakdown = (fr.sources||[]).map(s=>{
      const S=hById(s.starter_id);
      return `${S?S.name:'?'}: ${s.count}`;
    }).join(' + ');
    return `<div class="fin-row">
      <div class="fin-row-hd">
        <span class="chip chip-F">${F?F.name:'?'}</span>
        <span class="t-xs">${fr.cells_received||0} cells in${srcBreakdown?` (${srcBreakdown})`:''}</span>
        ${fp!==null?`<span class="chip ${fp>=70?'chip-ok':fp>=40?'chip-warn':'chip-due'}" style="margin-left:auto">${fp}%</span>`:''}
        <button class="btn btn-d btn-xs" onclick="removeFinRec('${id}',${i})">×</button>
      </div>
      ${(()=>{
        const d = dayjs(g.date);
        const estCapped  = d.add(5,'day').format('YYYY-MM-DD');
        const estEmerged = d.add(10,'day').format('YYYY-MM-DD');
        const actCapped  = fr.check_dates?.capped  || estCapped;
        const actEmerged = fr.check_dates?.emerged || estEmerged;
        const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const cappedDay = dayNames[dayjs(actCapped).day()];
        const outDay    = dayNames[dayjs(actEmerged).day()];
        const outIsWknd = dayjs(actEmerged).day()===0||dayjs(actEmerged).day()===6;
        return `<div class="move-counts">
          <div class="count-box">
            <label>Cells in</label>
            <input type="number" min="0" value="${fr.cells_received||''}"
              onchange="updateFinRec('${id}',${i},'cells_received',+this.value)">
          </div>
          ${!isA?`<div class="count-box">
            <label>Capped</label>
            <input type="number" min="0" value="${fr.capped??''}"
              onchange="updateFinRec('${id}',${i},'capped',this.value===''?null:+this.value)">
            <div style="font-size:9px;color:var(--amber);font-weight:700;margin-top:3px;text-align:center">${cappedDay} ${fmt(actCapped)}</div>
          </div>`:''}
          <div class="count-box">
            <label>Out</label>
            <input type="number" min="0" value="${fr.emerged??''}"
              onchange="updateFinRec('${id}',${i},'emerged',this.value===''?null:+this.value)">
            <div style="font-size:9px;color:${outIsWknd?'var(--red)':'var(--green)'};font-weight:700;margin-top:3px;text-align:center">${outDay} ${fmt(actEmerged)}${outIsWknd?' ⚠':''}</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
          <div class="count-box" style="background:var(--wax);flex:1">
            <label>Mated</label>
            <input type="number" min="0" value="${fr.mated??''}"
              onchange="updateFinRec('${id}',${i},'mated',this.value===''?null:+this.value)">
          </div>
          ${!isA?`<div style="flex:2;display:flex;gap:6px">
            <div class="field" style="flex:1">
              <label style="font-size:9px">Capped date</label>
              <input type="date" style="font-size:12px;padding:6px 8px"
                value="${actCapped}" onchange="updateFinRecDate('${id}',${i},'capped',this.value);renderRecPanel('${id}')">
            </div>
            <div class="field" style="flex:1">
              <label style="font-size:9px">Out date</label>
              <input type="date" style="font-size:12px;padding:6px 8px"
                value="${actEmerged}" onchange="updateFinRecDate('${id}',${i},'emerged',this.value);renderRecPanel('${id}')">
            </div>
          </div>`:''}
        </div>`;
      })()}
    </div>`;
  }).join('');

  // Add more finishers (after initial assignment done)
  const addMoreSection = frecs.length>0 ? `
    <div style="background:var(--wax);border-radius:var(--rs);padding:12px;margin-top:8px">
      <div class="sec-lbl">Add or top up a finisher</div>
      <p class="t-xs" style="margin-bottom:8px">Picking a finisher already in this batch will add to its total — same stage, counted together.</p>
      <div id="extra-fin-rows"></div>
      <button class="btn btn-add btn-sm btn-block mt8" onclick="addExtraFinRow('${id}')">+ Add finisher assignment</button>
    </div>` : '';

  document.getElementById('panel-body').innerHTML = `
    <div class="card">
      <div class="card-hd">Summary</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px">
        <div class="fin-stat"><div class="fsn">${totalGrafted(g)}</div><div class="fsl">Grafted</div></div>
        <div class="fin-stat"><div class="fsn">${tIn}</div><div class="fsl">In finishers</div></div>
        <div class="fin-stat"><div class="fsn">${tEm}</div><div class="fsl">Emerged</div></div>
      </div>
      ${gPct!==null?`<div class="sec-lbl">Emerged / grafted</div>${pctBar(gPct)}`:''}
      ${layPct!==null?`<div class="mt8 sec-lbl">Mated / grafted</div>${pctBar(layPct)}`:''}
    </div>

    ${sAllocs.length?`<div class="card"><div class="card-hd">Starters</div>${starterSummary}</div>`:''}

    ${day1Section}

    <div class="card">
      <div class="card-hd">Finisher Records</div>
      ${frecs.length ? finRecRows : `<p class="t-sm">No finishers assigned yet.</p>`}
      ${addMoreSection}
    </div>`;

  document.getElementById('hive-panel').classList.add('open');
}

// Day 1 assignment rows (dynamic)
// ── Day 1: starter-centric assignment ────────────────
// day1Data[starter_id] = [ {cells, finisher_id}, ... ]
let day1Data = {};

function buildDay1Section(gid, sAllocs) {
  const g = gById(gid);
  if (!sAllocs.length) return '';
  const rows = sAllocs.map(sa => {
    const S = hById(sa.starter_id);
    const remaining = sa.cells_in || 0;
    if (!day1Data[sa.starter_id]) day1Data[sa.starter_id] = [{cells:'', finisher_id:''}];
    const assignments = day1Data[sa.starter_id];
    const totalAssigned = assignments.reduce((a,r) => a + (+(r.cells)||0), 0);
    const leftOver = remaining - totalAssigned;

    const assignRows = assignments.map((asgn, ai) => `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <input type="number" min="0" placeholder="cells" value="${asgn.cells||''}"
          style="width:72px;padding:8px;text-align:center;font-size:16px;font-weight:700;
                 border:1.5px solid var(--wax2);border-radius:var(--rs);background:var(--cream)"
          oninput="day1Data['${sa.starter_id}'][${ai}].cells=+this.value;
                   document.getElementById('d1-left-${sa.starter_id}').textContent=
                     (${remaining} - day1Data['${sa.starter_id}'].reduce((a,r)=>a+(+(r.cells)||0),0)) + ' left'">
        <span style="color:var(--brown3);font-size:14px">→</span>
        <select style="flex:1;padding:8px;font-size:14px;border:1.5px solid var(--wax2);
                       border-radius:var(--rs);background:var(--cream)"
          onchange="day1Data['${sa.starter_id}'][${ai}].finisher_id=this.value">
          <option value="">Select F...</option>
          ${sortedFinishers(gid).map(f =>
            `<option value="${f.id}" ${asgn.finisher_id===f.id?'selected':''}
               style="${finisherOptionStyle(f,gid)}">${finisherOptionLabel(f,gid)}</option>`
          ).join('')}
        </select>
        ${assignments.length > 1
          ? `<button class="btn btn-d btn-xs" onclick="removeDay1Assignment('${sa.starter_id}',${ai});document.getElementById('day1-assignments').innerHTML=buildDay1Section('${gid}',${JSON.stringify(sAllocs)})">×</button>`
          : ''}
      </div>`).join('');

    return `<div style="background:var(--cream);border:1px solid var(--wax2);border-radius:var(--rs);
                        padding:12px;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span class="chip chip-S">${S?S.name:'?'}</span>
        <span style="font-size:13px;font-weight:700;color:var(--brown2)">${remaining} cells</span>
        <span id="d1-left-${sa.starter_id}" style="font-size:12px;font-weight:700;
              color:${leftOver>0?'var(--amber)':'var(--green)'};margin-left:auto">
          ${leftOver > 0 ? leftOver + ' left' : 'all assigned'}
        </span>
      </div>
      ${assignRows}
      <button class="btn btn-g btn-xs" style="margin-top:4px"
        onclick="addDay1Assignment('${sa.starter_id}');document.getElementById('day1-assignments').innerHTML=buildDay1Section('${gid}',${JSON.stringify(sAllocs)})">
        + Split to another finisher
      </button>
    </div>`;
  }).join('');

  return `<div class="card" style="border:2px solid var(--amber)">
    <div class="card-hd" style="color:var(--amber)">Day 1 — Assign cells to finishers</div>
    <p class="t-sm" style="margin-bottom:12px">
      For each starter, enter how many cells go to each finisher.
    </p>
    <div id="day1-assignments">${rows}</div>
    <button class="btn btn-p btn-block mt12" onclick="saveDay1('${gid}')">Save assignments</button>
  </div>`;
}

function addDay1Assignment(starter_id) {
  if (!day1Data[starter_id]) day1Data[starter_id] = [];
  day1Data[starter_id].push({cells:'', finisher_id:''});
}

function removeDay1Assignment(starter_id, ai) {
  if (day1Data[starter_id]) day1Data[starter_id].splice(ai, 1);
  if (!day1Data[starter_id].length) day1Data[starter_id] = [{cells:'', finisher_id:''}];
}

function saveDay1(gid) {
  const g = gById(gid); if (!g) return;
  const sAllocs = g.starter_allocations || [];

  // Validate — every assignment needs a finisher and cells
  let valid = true;
  sAllocs.forEach(sa => {
    const assignments = day1Data[sa.starter_id] || [];
    assignments.forEach(asgn => {
      if (asgn.finisher_id && !asgn.cells) { toast('Enter cell count for each assignment'); valid=false; }
      if (asgn.cells && !asgn.finisher_id) { toast('Select a finisher for each cell count'); valid=false; }
    });
  });
  if (!valid) return;

  if (!g.finisher_records) g.finisher_records = [];
  const _d = dayjs(g.date);
  const estCapped  = _d.add(5,'day').format('YYYY-MM-DD');
  const estEmerged = _d.add(10,'day').format('YYYY-MM-DD');

  sAllocs.forEach(sa => {
    const assignments = (day1Data[sa.starter_id] || []).filter(a => a.finisher_id && +a.cells > 0);
    assignments.forEach(asgn => {
      const existing = g.finisher_records.find(r => r.finisher_id === asgn.finisher_id);
      if (existing) {
        existing.cells_received += +asgn.cells;
        const exSrc = (existing.sources||[]).find(s => s.starter_id === sa.starter_id);
        if (exSrc) exSrc.count += +asgn.cells;
        else (existing.sources = existing.sources||[]).push({starter_id: sa.starter_id, count: +asgn.cells});
      } else {
        g.finisher_records.push({
          finisher_id: asgn.finisher_id,
          cells_received: +asgn.cells,
          sources: [{starter_id: sa.starter_id, count: +asgn.cells}],
          capped: null, emerged: null, mated: null,
          check_dates: { capped: estCapped, emerged: estEmerged }
        });
      }
      // Update starter cells_out
      sa.cells_out = (sa.cells_out||0) + +asgn.cells;
    });
  });

  day1Data = {};
  save();
  toast('Assignments saved');
  openRecordPanel(gid);
}

function saveExtraFin(gid, rowId, starterIds) {
  const g = gById(gid); if (!g) return;
  const finId = document.getElementById(rowId+'-fin')?.value;
  if (!finId) { toast('Select a finisher'); return; }
  const sources = starterIds.map(sid => ({
    starter_id: sid,
    count: +(document.getElementById(rowId+'-src-'+sid)?.value||0)
  })).filter(s=>s.count>0);
  const totalIn = sources.reduce((a,s)=>a+s.count,0);
  if (!totalIn) { toast('Enter at least one cell count'); return; }

  const existing = (g.finisher_records||[]).find(r=>r.finisher_id===finId);
  if (existing) {
    existing.cells_received += totalIn;
    sources.forEach(src=>{
      const ex=(existing.sources||[]).find(s=>s.starter_id===src.starter_id);
      if(ex) ex.count+=src.count; else (existing.sources=existing.sources||[]).push({...src});
    });
  } else {
    if (!g.finisher_records) g.finisher_records=[];
    const _d2 = dayjs(g.date);
    g.finisher_records.push({ finisher_id:finId, cells_received:totalIn, sources,
      capped:null, emerged:null, mated:null,
      check_dates:{
        capped:  _d2.add(5,'day').format('YYYY-MM-DD'),
        emerged: _d2.add(10,'day').format('YYYY-MM-DD')
      }
    });
  }
  sources.forEach(src=>{
    const sa=(g.starter_allocations||[]).find(s=>s.starter_id===src.starter_id);
    if(sa) sa.cells_out=(sa.cells_out||0)+src.count;
  });
  save(); toast('Finisher added'); openRecordPanel(gid);
}

function updateFinRec(gid, i, key, val) {
  const g = gById(gid); if (!g) return;
  g.finisher_records[i][key] = val;
  save();
}
function renderRecPanel(gid) {

}

function updateFinRecDate(gid, i, stage, val) {
  const g = gById(gid); if (!g) return;
  if (!g.finisher_records[i].check_dates) g.finisher_records[i].check_dates = {};
  g.finisher_records[i].check_dates[stage] = val;

}

function removeFinRec(gid, i) {
  const g = gById(gid); if (!g) return;
  g.finisher_records.splice(i,1);

}

function logMovement(gid) {
  const g = gById(gid); if (!g) return;
  const from  = document.getElementById('mv-from')?.value;
  const to    = document.getElementById('mv-to')?.value;
  const count = +document.getElementById('mv-count')?.value;
  const date  = document.getElementById('mv-date')?.value;
  const note  = document.getElementById('mv-note')?.value.trim();
  if (!from||!to) { toast('Select from and to hives'); return; }
  if (!count)     { toast('Enter cell count'); return; }
  if (!g.movements) g.movements=[];
  g.movements.push({ id:uid(), date, from_hive_id:from, to_hive_id:to, cell_count:count, note });
  save(); toast('Movement logged'); openRecordPanel(gid);
}

    btn.className = 'btn btn-xs ' + (bulkLogState.selectedHives.has(id)?'btn-p':'btn-g');
  }

  if (cnt) cnt.textContent = bulkLogState.selectedHives.size + ' hive' + (bulkLogState.selectedHives.size!==1?'s':'') + ' selected';

function bulkSelectAll(type) {
  const hs = type==='all' ? DB.hives : hByType(type);

}

function bulkDeselectAll(type) {
  if (type==='all') {
    bulkLogState.selectedHives.clear();
  } else {
    hByType(type).forEach(h => bulkLogState.selectedHives.delete(h.id));
  }
  showBulkLogPanel();
}

function saveBulkLog() {
  const s = bulkLogState;
  // Read current form values
  const types = [...document.querySelectorAll('input[name="bulk-type"]:checked')].map(x=>x.value);
  const note  = document.getElementById('bulk-note')?.value.trim() || '';
  const date  = document.getElementById('bulk-date')?.value || s.date;

  if (!types.length && !note) { toast('Select an action or add a comment'); return; }
  if (!s.selectedHives.size)  { toast('Select at least one hive'); return; }

  s.selectedHives.forEach(hid => {
    const h = hById(hid); if (!h) return;
    if (!h.log) h.log = [];
    h.log.push({ id:uid(), date, types, note });

  save();
  toast(`Logged ${s.selectedHives.size} hive${s.selectedHives.size!==1?'s':''}`);
